<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#07080C">
<meta name="description" content="BeeMaster AI - Yapay zeka destekli arıcılık yönetim platformu">
<title>🐝 BeeMaster AI - Arıcılık Yönetimi</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#07080C;--surface:#0F1117;--surface2:#161922;--surface3:#1F2330;
  --border:#252A3A;--border-strong:#3A4055;
  --text:#E8EAF2;--text-dim:#8A8FA3;--text-faint:#5C6178;
  --honey:#F4B400;--honey-2:#D99E00;--honey-3:#B8860B;--honey-soft:rgba(244,180,0,0.12);
  --green:#22C55E;--green-soft:rgba(34,197,94,0.12);
  --red:#EF4444;--red-soft:rgba(239,68,68,0.12);
  --blue:#3B82F6;--blue-soft:rgba(59,130,246,0.12);
  --purple:#A855F7;--purple-soft:rgba(168,85,247,0.12);
  --orange:#F97316;--orange-soft:rgba(249,115,22,0.12);
  --r-xs:4px;--r-sm:8px;--r:12px;--r-lg:16px;--r-xl:24px;
  --shadow:0 4px 24px rgba(0,0,0,.4);
  --shadow-lg:0 12px 40px rgba(0,0,0,.6);
  --t:200ms cubic-bezier(0.4,0,0.2,1);
}
[data-theme="light"]{
  --bg:#FAFAFC;--surface:#FFFFFF;--surface2:#F4F5F9;--surface3:#EAECEF;
  --border:#E2E5EE;--border-strong:#C5CAD7;
  --text:#0F1117;--text-dim:#5C6178;--text-faint:#8A8FA3;
  --shadow:0 4px 24px rgba(0,0,0,.08);
  --shadow-lg:0 12px 40px rgba(0,0,0,.12);
}
html,body{height:100%}
html{visibility:visible;opacity:1}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.55;overflow-x:hidden;-webkit-font-smoothing:antialiased}
::selection{background:var(--honey);color:#000}
::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}::-webkit-scrollbar-thumb:hover{background:var(--border-strong)}
:focus-visible{outline:2px solid var(--honey);outline-offset:2px;border-radius:var(--r-xs)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border:1px solid var(--border);background:var(--surface);color:var(--text);border-radius:var(--r-sm);cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;transition:var(--t);text-decoration:none;white-space:nowrap}
.btn:hover{border-color:var(--border-strong);background:var(--surface2)}
.btn-primary{background:var(--honey);color:#000;border-color:var(--honey)}
.btn-primary:hover{background:var(--honey-2);border-color:var(--honey-2)}
.btn-danger{background:var(--red-soft);color:var(--red);border-color:rgba(239,68,68,0.3)}
.btn-danger:hover{background:var(--red);color:#fff}
.btn-ghost{background:transparent;border-color:transparent;color:var(--text-dim)}
.btn-ghost:hover{background:var(--surface2);color:var(--text)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-icon{padding:8px;min-width:36px;justify-content:center}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--text);background:var(--bg);border:1px solid var(--border);padding:9px 12px;border-radius:var(--r-sm);transition:var(--t);width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--honey);box-shadow:0 0 0 3px rgba(244,180,0,0.15)}
textarea{resize:vertical;min-height:80px}
label{display:flex;flex-direction:column;gap:5px;font-size:12px;color:var(--text-dim);font-weight:600}
.app{display:grid;grid-template-columns:260px 1fr;grid-template-rows:64px 1fr;min-height:100vh;grid-template-areas:"side header" "side main"}
.sidebar{grid-area:side;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;z-index:100}
.brand{padding:18px 20px;display:flex;align-items:center;gap:10px;font-size:17px;font-weight:800;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:2}
.brand-mark{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--honey),var(--honey-3));display:flex;align-items:center;justify-content:center;font-size:18px}
.brand-name{background:linear-gradient(135deg,var(--honey),var(--honey-2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-0.02em}
.sidebar nav{padding:14px 10px;display:flex;flex-direction:column;gap:1px;flex:1}
.nav-group{padding:14px 14px 4px;font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-faint);font-weight:700}
.nav{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:var(--r-sm);color:var(--text-dim);font-size:13.5px;font-weight:500;cursor:pointer;text-decoration:none;border:none;background:transparent;width:100%;text-align:left;font-family:inherit;transition:var(--t)}
.nav:hover{color:var(--text);background:var(--surface2)}
.nav.active{background:var(--honey-soft);color:var(--honey);font-weight:600}
.nav-ico{font-size:16px;width:20px;text-align:center}
.sidebar-foot{padding:14px;border-top:1px solid var(--border)}
.user-card{display:flex;align-items:center;gap:10px;padding:10px;border-radius:var(--r);background:var(--surface2);cursor:pointer}
.avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--honey),var(--honey-3));display:flex;align-items:center;justify-content:center;font-weight:700;color:#000;font-size:13px;flex-shrink:0}
.user-name{font-size:13px;font-weight:600;line-height:1.3}.user-role{font-size:11px;color:var(--text-dim)}
.header{grid-area:header;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:50;gap:16px}
.page-info h1{font-size:17px;font-weight:700;line-height:1.2;letter-spacing:-0.01em}
.page-info p{font-size:12px;color:var(--text-dim);margin-top:1px}
.header-actions{display:flex;align-items:center;gap:6px}
.main{grid-area:main;padding:24px 24px 80px;overflow-x:hidden;max-width:100%}
.view{display:none;animation:fadeUp .3s ease}
.view.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;position:relative;overflow:hidden;transition:var(--t)}
.stat:hover{border-color:var(--border-strong);transform:translateY(-2px);box-shadow:var(--shadow)}
.stat-ico{position:absolute;top:14px;right:14px;width:36px;height:36px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-size:17px}
.stat-label{font-size:11px;color:var(--text-dim);font-weight:600;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:4px}
.stat-val{font-size:28px;font-weight:800;line-height:1;letter-spacing:-0.02em;margin-bottom:6px}
.stat-meta{font-size:11px;font-weight:600;display:flex;align-items:center;gap:4px}
.stat-meta.up{color:var(--green)}.stat-meta.down{color:var(--red)}.stat-meta.neutral{color:var(--text-dim)}
.grid-2{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:18px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;transition:var(--t)}
.card:hover{border-color:var(--border-strong)}
.card-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:10px}
.card-title{font-size:14px;font-weight:700;letter-spacing:-0.01em}
.card-sub{font-size:11px;color:var(--text-dim);margin-top:2px}
.link{font-size:12px;color:var(--honey);cursor:pointer;font-weight:600;text-decoration:none}
.link:hover{color:var(--honey-2)}
.row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border)}
.row:last-child{border-bottom:none}
.row-main{flex:1;min-width:0}
.row-name{font-size:13.5px;font-weight:600;line-height:1.3}
.row-info{font-size:11.5px;color:var(--text-dim);margin-top:2px;line-height:1.4}
.row-actions{display:flex;gap:5px;flex-shrink:0}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-g{background:var(--green)}.dot-y{background:var(--honey)}.dot-r{background:var(--red)}.dot-b{background:var(--blue)}.dot-p{background:var(--purple)}.dot-o{background:var(--orange)}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;padding:3px 8px;border-radius:99px;font-weight:600;letter-spacing:0.02em}
.badge-ok{background:var(--green-soft);color:var(--green)}.badge-warn{background:var(--honey-soft);color:var(--honey-2)}.badge-danger{background:var(--red-soft);color:var(--red)}.badge-info{background:var(--blue-soft);color:var(--blue)}.badge-purple{background:var(--purple-soft);color:var(--purple)}
.chart{height:200px;display:flex;align-items:flex-end;gap:10px;padding:0 4px 24px;border-bottom:1px dashed var(--border);position:relative}
.chart-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;min-width:0;position:relative}
.chart-bar{width:100%;max-width:36px;border-radius:6px 6px 0 0;background:linear-gradient(180deg,var(--honey),var(--honey-3));transition:var(--t);min-height:4px;position:relative}
.chart-bar:hover{filter:brightness(1.15)}
.chart-bar.danger{background:linear-gradient(180deg,var(--red),#B91C1C)}.chart-bar.warn{background:linear-gradient(180deg,var(--orange),#C2410C)}.chart-bar.ok{background:linear-gradient(180deg,var(--green),#15803D)}
.chart-val{font-size:10.5px;font-weight:600;color:var(--text)}
.chart-lbl{font-size:10.5px;color:var(--text-dim);white-space:nowrap}
.frame-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;margin-top:8px}
.frame{aspect-ratio:2/3;border:2px solid var(--border);border-radius:var(--r-sm);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:var(--t);padding:6px;position:relative}
.frame:hover{border-color:var(--honey);transform:scale(1.04)}
.frame.brood{background:rgba(249,115,22,0.12);border-color:rgba(249,115,22,0.4)}.frame.brood .frame-ico{color:var(--orange)}
.frame.honey{background:rgba(244,180,0,0.15);border-color:rgba(244,180,0,0.4)}.frame.honey .frame-ico{color:var(--honey)}
.frame.pollen{background:rgba(168,85,247,0.12);border-color:rgba(168,85,247,0.4)}.frame.pollen .frame-ico{color:var(--purple)}
.frame.foundation{background:var(--surface2);border-color:var(--border-strong)}.frame.foundation .frame-ico{color:var(--text-dim)}
.frame.empty{background:transparent;border-style:dashed}.frame.empty .frame-ico{color:var(--text-faint)}
.frame.retired{background:var(--red-soft);border-color:var(--red)}.frame.retired .frame-ico{color:var(--red)}
.frame-ico{font-size:20px;margin-bottom:3px}.frame-num{font-size:10px;font-weight:700;color:var(--text-dim)}.frame-cycle{font-size:9px;color:var(--text-faint);margin-top:1px}
.frame-legend{display:flex;flex-wrap:wrap;gap:10px;padding:10px;background:var(--surface2);border-radius:var(--r-sm);margin-top:10px;font-size:11px}
.legend-item{display:flex;align-items:center;gap:6px;color:var(--text-dim)}.legend-dot{width:12px;height:12px;border-radius:3px}
.actions-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:10px;flex-wrap:wrap}
.search{flex:1;min-width:200px;max-width:360px;position:relative}
.search input{padding-left:36px}
.search-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-faint);font-size:14px}
.empty-state{padding:40px 16px;text-align:center;color:var(--text-dim)}
.empty-ico{font-size:40px;margin-bottom:12px;opacity:0.6}
.empty-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px}
.empty-sub{font-size:12.5px;margin-bottom:14px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:200;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
.modal-overlay.active{display:flex;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);width:100%;max-width:520px;max-height:90vh;display:flex;flex-direction:column;box-shadow:var(--shadow-lg);animation:slideUp .25s cubic-bezier(0.4,0,0.2,1)}
@keyframes slideUp{from{opacity:0;transform:translateY(20px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:18px 22px;border-bottom:1px solid var(--border);gap:10px}
.modal-head h3{font-size:16px;font-weight:700;letter-spacing:-0.01em}
.modal-close{background:transparent;border:none;color:var(--text-dim);font-size:24px;cursor:pointer;padding:4px 8px;line-height:1;font-family:inherit;border-radius:var(--r-xs)}
.modal-close:hover{color:var(--text);background:var(--surface2)}
.modal-body{padding:20px 22px;overflow-y:auto;display:flex;flex-direction:column;gap:14px}
.modal-foot{display:flex;justify-content:flex-end;gap:8px;padding:14px 22px;border-top:1px solid var(--border);background:var(--surface2);border-radius:0 0 var(--r-lg) var(--r-lg)}
.field{display:flex;flex-direction:column;gap:5px;font-size:12px;color:var(--text-dim);font-weight:600}
.field>span{font-size:11.5px;text-transform:uppercase;letter-spacing:0.04em}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.toast-container{position:fixed;bottom:24px;right:24px;z-index:300;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--honey);padding:11px 16px;border-radius:var(--r-sm);box-shadow:var(--shadow);max-width:340px;font-size:13px;animation:slideIn .25s;pointer-events:auto}
.toast.success{border-left-color:var(--green)}.toast.error{border-left-color:var(--red)}.toast.info{border-left-color:var(--blue)}
@keyframes slideIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
.tab-bar{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:16px;overflow-x:auto}
.tab{padding:10px 14px;border:none;background:transparent;color:var(--text-dim);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;transition:var(--t);white-space:nowrap}
.tab:hover{color:var(--text)}
.tab.active{color:var(--honey);border-bottom-color:var(--honey)}
.timeline{padding:4px 0}
.timeline-item{display:flex;gap:14px;padding:12px 0;border-bottom:1px solid var(--border);position:relative}
.timeline-ico{width:32px;height:32px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.timeline-body{flex:1;min-width:0}
.timeline-title{font-size:13.5px;font-weight:600;margin-bottom:2px}
.timeline-meta{font-size:11.5px;color:var(--text-dim)}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px}
.kpi{background:var(--surface2);border-radius:var(--r-sm);padding:12px;text-align:center}
.kpi-val{font-size:22px;font-weight:800;letter-spacing:-0.02em;margin-bottom:2px}
.kpi-lbl{font-size:11px;color:var(--text-dim);font-weight:600}
.ai-card{background:linear-gradient(135deg,rgba(244,180,0,0.08),rgba(168,85,247,0.06));border:1px solid rgba(244,180,0,0.2)}
.ai-item{display:flex;gap:10px;padding:10px;background:var(--surface);border-radius:var(--r-sm);margin-bottom:8px;border:1px solid var(--border)}
.ai-ico{width:32px;height:32px;border-radius:var(--r-sm);background:var(--honey-soft);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.ai-body{flex:1;font-size:12.5px;line-height:1.5}
.ai-title{font-weight:700;color:var(--text);margin-bottom:2px}
.ai-sub{color:var(--text-dim);font-size:11.5px}
.bottom-nav{display:none}
@media(max-width:1024px){
  .app{grid-template-columns:1fr;grid-template-areas:"header" "main"}
  .sidebar{position:fixed;left:-280px;width:260px;transition:left .3s;box-shadow:var(--shadow-lg)}
  .sidebar.open{left:0}
  .stats{grid-template-columns:repeat(2,1fr)}
  .grid-2,.grid-3{grid-template-columns:1fr}
  .bottom-nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);z-index:90;padding:8px 4px;justify-content:space-around;backdrop-filter:blur(12px);background:rgba(15,17,23,0.92)}
  [data-theme="light"] .bottom-nav{background:rgba(255,255,255,0.92)}
  .bnav{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 10px;border:none;background:transparent;color:var(--text-dim);font-size:10px;cursor:pointer;font-family:inherit;border-radius:var(--r-sm);min-width:50px}
  .bnav.active{color:var(--honey)}
  .bnav-ico{font-size:18px}
  .main{padding:16px 16px 90px}
  .stat-val{font-size:22px}
}
@media(max-width:640px){
  .field-row,.field-row-3{grid-template-columns:1fr}
  .stats{grid-template-columns:1fr 1fr}
  .header{padding:0 14px}
  .actions-bar{flex-direction:column;align-items:stretch}
  .search{max-width:100%}
}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-mark">🐝</div>
      <span class="brand-name">BeeMaster AI</span>
    </div>
    <nav id="nav-list">
      <div class="nav-group">Genel</div>
      <button class="nav active" data-view="dashboard" onclick="App.nav('dashboard')"><span class="nav-ico">📊</span>Dashboard</button>
      <button class="nav" data-view="apiaries" onclick="App.nav('apiaries')"><span class="nav-ico">📍</span>Arı Üsleri</button>
      <button class="nav" data-view="hives" onclick="App.nav('hives')"><span class="nav-ico">🏠</span>Kovanlar</button>
      <div class="nav-group">Operasyon</div>
      <button class="nav" data-view="inspections" onclick="App.nav('inspections')"><span class="nav-ico">📋</span>Muayeneler</button>
      <button class="nav" data-view="harvest" onclick="App.nav('harvest')"><span class="nav-ico">🍯</span>Bal Hasadı</button>
      <button class="nav" data-view="feeding" onclick="App.nav('feeding')"><span class="nav-ico">🌾</span>Besleme</button>
      <button class="nav" data-view="treatments" onclick="App.nav('treatments')"><span class="nav-ico">💊</span>Tedaviler</button>
      <button class="nav" data-view="diseases" onclick="App.nav('diseases')"><span class="nav-ico">🦠</span>Hastalıklar</button>
      <div class="nav-group">Yönetim</div>
      <button class="nav" data-view="queens" onclick="App.nav('queens')"><span class="nav-ico">👑</span>Ana Arılar</button>
      <button class="nav" data-view="inventory" onclick="App.nav('inventory')"><span class="nav-ico">📦</span>Envanter</button>
      <button class="nav" data-view="analytics" onclick="App.nav('analytics')"><span class="nav-ico">📈</span>Analitik</button>
      <button class="nav" data-view="reports" onclick="App.nav('reports')"><span class="nav-ico">📄</span>Raporlar</button>
      <button class="nav" data-view="settings" onclick="App.nav('settings')"><span class="nav-ico">⚙️</span>Ayarlar</button>
    </nav>
    <div class="sidebar-foot">
      <div class="user-card" onclick="App.nav('settings')">
        <div class="avatar">İÖ</div>
        <div><div class="user-name">İlker Öcal</div><div class="user-role">Arıcı · Diyarbakır</div></div>
      </div>
    </div>
  </aside>
  <header class="header">
    <div class="page-info">
      <h1 id="page-title">Dashboard</h1>
      <p id="page-subtitle">Genel bakış · Eğil, Diyarbakır</p>
    </div>
    <div class="header-actions">
      <button class="btn btn-icon btn-ghost" onclick="App.toast('Arama yakında','info')" title="Ara">🔍</button>
      <button class="btn btn-icon btn-ghost" onclick="App.toggleTheme()" id="theme-toggle" title="Tema">🌙</button>
      <button class="btn btn-icon btn-ghost" onclick="App.toast('Bildirim yok','info')" title="Bildirimler">🔔</button>
      <button class="btn btn-primary" onclick="App.quickAdd()">+ Ekle</button>
    </div>
  </header>
  <main class="main" id="main-content">
    <div id="view-dashboard" class="view active"></div>

  <div class="modal" id="modal">

<div class="toast-container" id="toast-container"></div>
<script>
// BeeMaster AI v2.0 — Spec-Driven (docs/01-16)
// ============================================================
'use strict';
const STORAGE_KEY='beemaster-v2';

// DATA
const Data={
  state:null,
  load(){try{const s=localStorage.getItem(STORAGE_KEY);if(s){this.state=JSON.parse(s);return true;}}catch(e){}return false},
  save(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(this.state));}catch(e){}},
  seed(){
    const now=new Date().toISOString();
    const daysAgo=d=>new Date(Date.now()-d*864e5).toISOString().slice(0,10);
    this.state={apiaries:[],hives:[],queens:[],frames:[],inspections:[],harvests:[],feedings:[],treatments:[],diseases:[],inventory:[]};
    const a1=uid(),a2=uid();
    this.state.apiaries.push({id:a1,name:'Eğil Merkez',location:'Eğil, Diyarbakır',lat:38.247,lng:40.135,flora:'Geven, Kekik, Adaçayı, Pamuk',notes:'Ana üs — yayla konumu',createdAt:now,updatedAt:now});
    this.state.apiaries.push({id:a2,name:'Surlar Üssü',location:'Sur, Diyarbakır',lat:37.915,lng:40.230,flora:'Pamuk, Ayçiçeği, Geven',notes:'Şehir kenarı',createdAt:now,updatedAt:now});
    const seed=[
      {n:'Kovan-01',ap:a1,strain:'carniolan',box:'langstroth',fc:10,pop:'very_strong',var:1,qBreed:'Karniyol F1',qAge:2},
      {n:'Kovan-02',ap:a1,strain:'caucasian',box:'langstroth',fc:10,pop:'strong',var:3,qBreed:'Kafkas Saf',qAge:3},
      {n:'Kovan-03',ap:a1,strain:'anatolian',box:'langstroth',fc:10,pop:'strong',var:2,qBreed:'Anadolu Yerli',qAge:1},
      {n:'Kovan-04',ap:a1,strain:'carniolan',box:'langstroth',fc:8,pop:'strong',var:2,qBreed:'Karniyol',qAge:2},
      {n:'Kovan-05',ap:a2,strain:'caucasian',box:'dadant',fc:7,pop:'weak',var:8,qBreed:'Kafkas',qAge:4},
      {n:'Kovan-06',ap:a2,strain:'anatolian',box:'langstroth',fc:10,pop:'strong',var:2,qBreed:'Anadolu',qAge:2},
      {n:'Kovan-07',ap:a2,strain:'hybrid',box:'layens',fc:8,pop:'medium',var:4,qBreed:'Hibrit',qAge:2}
    ];
    seed.forEach((s,i)=>{
      const hid=uid(),qid=uid();
      const status=s.var>=6?'active':(s.var>=3?'active':(s.pop==='weak'?'weak':'active'));
      this.state.queens.push({id:qid,hiveId:hid,strain:s.strain,birthDate:new Date(Date.now()-s.qAge*365*864e5).toISOString().slice(0,10),source:'bred',markedColor:['white','yellow','red','green','blue'][(new Date().getFullYear()-s.qAge)%5],status:'active',performanceScore:Math.max(0.3,1-s.var*0.08-(s.pop==='weak'?0.3:0)),notes:'',createdAt:now,updatedAt:now});
      this.state.hives.push({id:hid,apiaryId:s.ap,name:s.n,status:status,strain:s.strain,boxType:s.box,frameCount:s.fc,positionInApiary:i+1,queenId:qid,nfcTag:'BM-'+Date.now().toString(36).toUpperCase()+'-'+(i+1),installedAt:new Date(Date.now()-(i+1)*30*864e5).toISOString().slice(0,10),notes:'',createdAt:now,updatedAt:now});
      const ftypes=['brood','brood','brood','honey','honey','pollen','foundation','empty'];
      for(let p=1;p<=s.fc;p++){
        this.state.frames.push({id:uid(),hiveId:hid,position:p,frameType:ftypes[(p-1)%ftypes.length]||'empty',foundationType:'wax',status:'in_use',cyclesCompleted:Math.floor(Math.random()*4),waxAgeMonths:Math.floor(Math.random()*24)+1,notes:'',createdAt:now,updatedAt:now});
      }
    });
    const inspSeed=[
      {hi:0,days:3,var:1,pop:'very_strong',brood:7,honey:2,note:'Sezon başı kontrol'},
      {hi:1,days:5,var:3,pop:'strong',brood:5,honey:3,note:'Ana arı yumurtluyor'},
      {hi:2,days:2,var:2,pop:'strong',brood:6,honey:4,note:'Yavru düzeni iyi'},
      {hi:3,days:1,var:2,pop:'strong',brood:5,honey:3,note:'Hızlı gelişme'},
      {hi:4,days:7,var:8,pop:'weak',brood:2,honey:1,note:'ACİL: Varroa yüksek'},
      {hi:5,days:4,var:2,pop:'strong',brood:6,honey:3,note:'Normal kontrol'},
      {hi:6,days:6,var:4,pop:'medium',brood:4,honey:2,note:'Çerçeve azaldı'}
    ];
    inspSeed.forEach(s=>{
      this.state.inspections.push({id:uid(),hiveId:this.state.hives[s.hi].id,date:daysAgo(s.days),varroaCount:s.var,population:s.pop,eggsPattern:'regular',broodFrames:s.brood,honeyFrames:s.honey,queenSeen:true,weather:'sunny',notes:s.note,createdAt:now});
    });
    [{h:0,days:90,w:4.2},{h:1,days:60,w:6.5},{h:2,days:30,w:8.8},{h:3,days:15,w:3.2},{h:5,days:25,w:5.4},{h:6,days:45,w:4.1}].forEach(x=>{
      this.state.harvests.push({id:uid(),hiveId:this.state.hives[x.h].id,apiaryId:this.state.hives[x.h].apiaryId,date:daysAgo(x.days),weight:x.w,quality:'A',frames:Math.floor(x.w/1.5),notes:'',createdAt:now});
    });
    this.state.feedings.push({id:uid(),hiveId:this.state.hives[4].id,date:daysAgo(2),type:'sugar_syrup',amountKg:2.5,reason:'weak_colony',status:'completed',notes:'1:1 şurup',createdAt:now});
    this.state.feedings.push({id:uid(),hiveId:this.state.hives[6].id,date:daysAgo(10),type:'fondant',amountKg:1,reason:'winter_prep',status:'planned',notes:'Kışlık destek',createdAt:now});
    this.state.treatments.push({id:uid(),hiveId:this.state.hives[4].id,date:daysAgo(1),product:'Apivar',dosage:'2 şerit',duration:'42 gün',varroaBefore:8,varroaAfter:null,status:'in_progress',notes:'Varroa yüksek — acil tedavi',createdAt:now});
    this.state.diseases.push({id:uid(),hiveId:this.state.hives[4].id,date:daysAgo(1),disease:'varroosis',severity:'high',treatment:'Apivar',status:'treating',notes:'Varroa destructor',createdAt:now});
    [{n:'Apivar şerit',c:'medication',q:8,u:'adet',m:5,p:85},{n:'Şeker (besleme)',c:'feed',q:25,u:'kg',m:10,p:12},{n:'Çerçeve (boş)',c:'equipment',q:30,u:'adet',m:10,p:35},{n:'Petek temeli',c:'equipment',q:50,u:'adet',m:20,p:8},{n:'Ana arı kafesi',c:'equipment',q:3,u:'adet',m:2,p:25}].forEach(i=>{
      this.state.inventory.push({id:uid(),name:i.n,category:i.c,quantity:i.q,unit:i.u,minStock:i.m,costTry:i.p,supplier:'',notes:'',createdAt:now});
    });
    this.save();
  },
  add(c,d){const id=uid();const o={id,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString(),...d};this.state[c].push(o);this.save();return o;},
  update(c,id,d){const i=this.state[c].findIndex(x=>x.id===id);if(i<0)return null;this.state[c][i]={...this.state[c][i],...d,updatedAt:new Date().toISOString()};this.save();return this.state[c][i];},
  remove(c,id){this.state[c]=this.state[c].filter(x=>x.id!==id);this.save();},
  get(c,id){return this.state[c].find(x=>x.id===id);},
  insights(){
    const out=[];
    this.state.hives.forEach(h=>{
      const last=this.state.inspections.filter(i=>i.hiveId===h.id).sort((a,b)=>b.date.localeCompare(a.date))[0];
      if(last&&last.varroaCount>=6)out.push({type:'danger',icon:'⚠️',title:h.name+' — Acil varroa tedavisi',sub:'Varroa: '+last.varroaCount+' (eşik ≥6). Apivar/Oksalik asit önerilir.'});
      else if(last&&last.varroaCount>=3)out.push({type:'warn',icon:'⚡',title:h.name+' — Varroa takibi',sub:'Varroa: '+last.varroaCount+'. İzleme önerilir.'});
      if(last&&last.population==='weak')out.push({type:'warn',icon:'🍯',title:h.name+' — Besleme gerekli',sub:'Zayıf koloni. Şurup/fondant ile destekleyin.'});
      const q=this.state.queens.find(q=>q.id===h.queenId);
      if(q){const age=(Date.now()-new Date(q.birthDate).getTime())/(365*864e5);if(age>=3)out.push({type:'info',icon:'👑',title:h.name+' — Ana arı yaşlı',sub:age.toFixed(1)+' yıl. Performans düşebilir.'});}
    });
    this.state.inventory.forEach(i=>{if(i.quantity<=i.minStock)out.push({type:'warn',icon:'📦',title:'Stok az: '+i.name,sub:'Mevcut: '+i.quantity+' '+i.unit+', min: '+i.minStock});});
    if(this.state.harvests.length){const last=this.state.harvests.sort((a,b)=>b.date.localeCompare(a.date))[0];const days=Math.floor((Date.now()-new Date(last.date).getTime())/864e5);if(days>30)out.push({type:'info',icon:'🍯',title:'Hasat zamanı yaklaşıyor',sub:'Son hasattan '+days+' gün geçti.'});}
    return out.slice(0,8);
  }
};
function uid(){return 'id_'+Date.now().toString(36)+Math.random().toString(36).slice(2,8);}
if(!Data.load())Data.seed();

// HELPERS
const H={
  esc:s=>s==null?'':String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])),
  fmt:(n,d=1)=>Number(n||0).toFixed(d),
  statusBadge(s){const m={good:'İYİ',warning:'DİKKAT',danger:'ACİL',active:'AKTİF',weak:'ZAYIF',dead:'ÖLÜ',sold:'SATILDI',merged:'BİRLEŞTİ',treating:'TEDAVİDE',planned:'PLANLI',completed:'TAMAMLANDI',in_progress:'SÜRÜYOR',resolved:'ÇÖZÜLDÜ',superseded:'DEĞİŞTİ',missing:'KAYIP'};const cls=s==='good'||s==='active'||s==='completed'||s==='resolved'?'badge-ok':(s==='danger'||s==='dead'?'badge-danger':'badge-warn');return `<span class="badge ${cls}">${m[s]||s}</span>`},
  dot(s){return s==='good'||s==='active'||s==='completed'?'dot-g':(s==='danger'||s==='dead'?'dot-r':'dot-y')},
  strainTr:s=>{return{anatolian:'Anadolu',caucasian:'Kafkas',carniolan:'Karniyol',italian:'İtalyan',hybrid:'Hibrit'}[s]||s},
  boxTr:s=>{return{langstroth:'Langstroth',dadant:'Dadant',layens:'Layens',flow:'Flow',top_bar:'Top-Bar'}[s]||s},
  popTr:s=>{return{very_strong:'Çok Güçlü',strong:'Güçlü',medium:'Orta',weak:'Zayıf',very_weak:'Çok Zayıf'}[s]||s},
  colorTr:s=>{return{white:'Beyaz',yellow:'Sarı',red:'Kırmızı',green:'Yeşil',blue:'Mavi'}[s]||s},
  frameTr:s=>{return{brood:'Yumurtalık',honey:'Bal',pollen:'Polen',foundation:'Perga',empty:'Boş'}[s]||s},
  frameIco:s=>{return{brood:'🟠',honey:'🟡',pollen:'🟣',foundation:'⚪',empty:'⚫'}[s]||'⬜'},
  sourceTr:s=>{return{bred:'Yetiştirildi',purchased:'Satın alındı',swarm:'Oğul',supersedure:'Süpersedür',emergency:'Acil'}[s]||s},
  reasonTr:s=>{return{weak_colony:'Zayıf koloni',winter_prep:'Kış hazırlığı',drought:'Kuraklık',supplement:'Ek besin',stimulative:'Teşvik'}[s]||s},
  typeTr:s=>{return{sugar_syrup:'Şeker Şurubu',fondant:'Fondant',pollen_patty:'Polen Keçi',candy:'Kek',honey_water:'Bal+Su'}[s]||s},
  diseaseTr:s=>{return{varroosis:'Varroosis (Varroa)',nosemosis:'Nosema',foulbrood:'Yavru Çürüğü',chalkbrood:'Kireç Hastalığı',sacbrood:'Torba Hastalığı',small_hive_beetle:'Küçük Kovan Böceği'}[s]||s},
  diseaseIco:s=>{return{varroosis:'🦠',nosemosis:'🦠',foulbrood:'⚠️',chalkbrood:'⚪',sacbrood:'⚠️',small_hive_beetle:'🪲'}[s]||'⚠️'},
  inventoryCatTr:s=>{return{medication:'İlaç',feed:'Yem',equipment:'Ekipman',consumable:'Sarf'}[s]||s},
  dateStr:d=>{if(!d)return'-';try{return new Date(d).toLocaleDateString('tr-TR',{day:'numeric',month:'short',year:'numeric'})}catch(e){return d}},
  dateAgo:d=>{if(!d)return'-';const ms=Date.now()-new Date(d).getTime();const day=Math.floor(ms/864e5);if(day===0)return'bugün';if(day===1)return'dün';if(day<30)return day+' gün önce';if(day<365)return Math.floor(day/30)+' ay önce';return Math.floor(day/365)+' yıl önce'},
  today(){return new Date().toISOString().slice(0,10)}
};

// MODAL
const Modal={
  cb:null,
  open(title,html,onSubmit){document.getElementById('modal-title').textContent=title;document.getElementById('modal-body').innerHTML=html;document.getElementById('modal-overlay').classList.add('active');this.cb=onSubmit;setTimeout(()=>{const f=document.getElementById('modal-body').querySelector('input,select,textarea');if(f)f.focus()},50)},
  close(){document.getElementById('modal-overlay').classList.remove('active');this.cb=null},
  submit(e){e.preventDefault();const fd=new FormData(e.target);const d={};fd.forEach((v,k)=>d[k]=v);if(this.cb&&this.cb(d)!==false)Modal.close()},
  confirm(msg,onYes){Modal.open('Onay',`<div class="empty-state" style="padding:10px 0"><div class="empty-ico">⚠️</div><div class="empty-title">${msg}</div></div>`,()=>{onYes();return true})}
};
// CRUD: APIARY
const Apiary={
  add(){
    Modal.open('Yeni Arı Üssü',
      `<label class="field"><span>Ad *</span><input name="name" required placeholder="Örn: Çınar Üssü"></label>
       <label class="field"><span>Konum *</span><input name="location" required placeholder="Örn: Çınar, Diyarbakır"></label>
       <div class="field-row"><label class="field"><span>Enlem</span><input name="lat" type="number" step="0.001" placeholder="38.247"></label>
       <label class="field"><span>Boylam</span><input name="lng" type="number" step="0.001" placeholder="40.135"></label></div>
       <label class="field"><span>Flora</span><input name="flora" placeholder="Geven, Kekik, Pamuk"></label>
       <label class="field"><span>Notlar</span><textarea name="notes" rows="2"></textarea></label>`,
      d=>{Data.add('apiaries',d);App.toast('Üs eklendi ✓','success');App.render('apiaries');return true}
    );
  },
  edit(id){
    const a=Data.get('apiaries',id);if(!a)return;
    Modal.open('Üs Düzenle',
      `<label class="field"><span>Ad *</span><input name="name" required value="${H.esc(a.name)}"></label>
       <label class="field"><span>Konum *</span><input name="location" required value="${H.esc(a.location)}"></label>
       <div class="field-row"><label class="field"><span>Enlem</span><input name="lat" type="number" step="0.001" value="${a.lat||''}"></label>
       <label class="field"><span>Boylam</span><input name="lng" type="number" step="0.001" value="${a.lng||''}"></label></div>
       <label class="field"><span>Flora</span><input name="flora" value="${H.esc(a.flora||'')}"></label>
       <label class="field"><span>Notlar</span><textarea name="notes" rows="2">${H.esc(a.notes||'')}</textarea></label>`,
      d=>{Data.update('apiaries',id,d);App.toast('Üs güncellendi ✓','success');App.render('apiaries');return true}
    );
  },
  del(id){
    const a=Data.get('apiaries',id);if(!a)return;
    const hc=Data.state.hives.filter(h=>h.apiaryId===id).length;
    if(hc>0){App.toast(`Bu üsde ${hc} kovan var. Önce kovanları silin.`,'error');return}
    Modal.confirm(`"${a.name}" üssünü silmek istiyor musunuz?`,()=>{Data.remove('apiaries',id);App.toast('Üs silindi','info');App.render('apiaries')});
  }
};

// CRUD: HIVE
const Hive={
  add(){
    if(!Data.state.apiaries.length){App.toast('Önce arı üssü ekleyin','error');return}
    const apOpts=Data.state.apiaries.map(a=>`<option value="${a.id}">${H.esc(a.name)}</option>`).join('');
    Modal.open('Yeni Kovan',
      `<label class="field"><span>Kovan Adı *</span><input name="name" required placeholder="Örn: Kovan-08"></label>
       <label class="field"><span>Arı Üssü *</span><select name="apiaryId" required>${apOpts}</select></label>
       <div class="field-row"><label class="field"><span>Irk</span><select name="strain"><option value="anatolian">Anadolu</option><option value="caucasian">Kafkas</option><option value="carniolan">Karniyol</option><option value="italian">İtalyan</option><option value="hybrid">Hibrit</option></select></label>
       <label class="field"><span>Kutu Tipi</span><select name="boxType"><option value="langstroth">Langstroth</option><option value="dadant">Dadant</option><option value="layens">Layens</option><option value="flow">Flow</option><option value="top_bar">Top-Bar</option></select></label></div>
       <div class="field-row"><label class="field"><span>Çerçeve Sayısı</span><input name="frameCount" type="number" min="1" max="20" value="10"></label>
       <label class="field"><span>Pozisyon</span><input name="positionInApiary" type="number" min="1" value="${Data.state.hives.length+1}"></label></div>
       <label class="field"><span>NFC/QR Etiket</span><input name="nfcTag" placeholder="Otomatik oluşturulur"></label>
       <label class="field"><span>Kurulum Tarihi</span><input name="installedAt" type="date" value="${H.today()}"></label>
       <label class="field"><span>Notlar</span><textarea name="notes" rows="2"></textarea></label>`,
      d=>{
        const h=Data.add('hives',{...d,status:'active',queenId:null,nfcTag:d.nfcTag||('BM-'+Date.now().toString(36).toUpperCase())});
        const fc=parseInt(d.frameCount)||10;
        for(let p=1;p<=fc;p++){
          Data.state.frames.push({id:uid(),hiveId:h.id,position:p,frameType:p<=3?'brood':(p<=6?'honey':'foundation'),foundationType:'wax',status:'in_use',cyclesCompleted:0,waxAgeMonths:0,notes:'',createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()});
        }
        Data.save();
        App.toast('Kovan eklendi ✓','success');
        App.render('hives');
        return true;
      }
    );
  },
  edit(id){
    const h=Data.get('hives',id);if(!h)return;
    const apOpts=Data.state.apiaries.map(a=>`<option value="${a.id}"${a.id===h.apiaryId?' selected':''}>${H.esc(a.name)}</option>`).join('');
    Modal.open('Kovan Düzenle',
      `<label class="field"><span>Kovan Adı *</span><input name="name" required value="${H.esc(h.name)}"></label>
       <label class="field"><span>Arı Üssü *</span><select name="apiaryId" required>${apOpts}</select></label>
       <div class="field-row"><label class="field"><span>Irk</span><select name="strain">${['anatolian','caucasian','carniolan','italian','hybrid'].map(s=>`<option value="${s}"${h.strain===s?' selected':''}>${H.strainTr(s)}</option>`).join('')}</select></label>
       <label class="field"><span>Kutu Tipi</span><select name="boxType">${['langstroth','dadant','layens','flow','top_bar'].map(b=>`<option value="${b}"${h.boxType===b?' selected':''}>${H.boxTr(b)}</option>`).join('')}</select></label></div>
       <div class="field-row"><label class="field"><span>Çerçeve</span><input name="frameCount" type="number" min="1" max="20" value="${h.frameCount}"></label>
       <label class="field"><span>Durum</span><select name="status">${['active','weak','dead','sold','merged'].map(s=>`<option value="${s}"${h.status===s?' selected':''}>${s}</option>`).join('')}</select></label></div>
       <label class="field"><span>NFC/QR Etiket</span><input name="nfcTag" value="${H.esc(h.nfcTag||'')}"></label>
       <label class="field"><span>Notlar</span><textarea name="notes" rows="2">${H.esc(h.notes||'')}</textarea></label>`,
      d=>{Data.update('hives',id,d);App.toast('Kovan güncellendi ✓','success');App.render('hives');return true}
    );
  },
  del(id){
    const h=Data.get('hives',id);if(!h)return;
    Modal.confirm(`"${h.name}" kovanını silmek istiyor musunuz? Tüm ilişkili kayıtlar da silinecek.`,()=>{
      ['frames','inspections','harvests','feedings','treatments','diseases'].forEach(c=>Data.state[c]=Data.state[c].filter(x=>x.hiveId!==id));
      Data.state.queens=Data.state.queens.filter(q=>q.hiveId!==id);
      Data.remove('hives',id);
      App.toast('Kovan silindi','info');
      App.render('hives');
    });
  },
  detail(id){
    const h=Data.get('hives',id);if(!h)return;
    const apiary=Data.get('apiaries',h.apiaryId);
    const queen=Data.state.queens.find(q=>q.id===h.queenId);
    const frames=Data.state.frames.filter(f=>f.hiveId===id).sort((a,b)=>a.position-b.position);
    const inspections=Data.state.inspections.filter(i=>i.hiveId===id).sort((a,b)=>b.date.localeCompare(a.date));
    const harvests=Data.state.harvests.filter(hv=>hv.hiveId===id).sort((a,b)=>b.date.localeCompare(a.date));
    const feedings=Data.state.feedings.filter(f=>f.hiveId===id).sort((a,b)=>b.date.localeCompare(a.date));
    const treatments=Data.state.treatments.filter(t=>t.hiveId===id).sort((a,b)=>b.date.localeCompare(a.date));
    const diseases=Data.state.diseases.filter(d=>d.hiveId===id).sort((a,b)=>b.date.localeCompare(a.date));
    const totalHoney=harvests.reduce((s,h)=>s+h.weight,0);
    const lastInsp=inspections[0];
    const strength=lastInsp?lastInsp.population:'medium';
    const varroa=lastInsp?lastInsp.varroaCount:0;
    const queenAge=queen?((Date.now()-new Date(queen.birthDate).getTime())/(365*864e5)).toFixed(1):'-';
    const html=`
      <div class="actions-bar" style="margin-bottom:16px">
        <div>
          <a class="link" onclick="App.nav('hives')">← Kovanlar</a>
          <h1 style="font-size:24px;font-weight:800;margin-top:6px">${H.esc(h.name)}</h1>
          <p style="color:var(--text-dim);font-size:13px">${H.esc(apiary?apiary.name:'Atanmamış')} · ${H.strainTr(h.strain)} · ${H.boxTr(h.boxType)} · NFC: ${H.esc(h.nfcTag||'-')}</p>
        </div>
        <div style="display:flex;gap:6px">
          <button class="btn" onclick="Hive.edit('${id}')">Düzenle</button>
          <button class="btn btn-primary" onclick="Inspection.add('${id}')">+ Muayene</button>
          <button class="btn btn-danger" onclick="Hive.del('${id}')">Sil</button>
        </div>
      </div>
      <div class="kpi-row">
        <div class="kpi"><div class="kpi-val">${H.popTr(strength)}</div><div class="kpi-lbl">Koloni Gücü</div></div>
        <div class="kpi"><div class="kpi-val">${varroa}</div><div class="kpi-lbl">Son Varroa</div></div>
        <div class="kpi"><div class="kpi-val">${H.fmt(totalHoney)} kg</div><div class="kpi-lbl">Toplam Bal</div></div>
        <div class="kpi"><div class="kpi-val">${queenAge} yıl</div><div class="kpi-lbl">Ana Arı Yaşı</div></div>
      </div>
      <div class="tab-bar">
        <button class="tab active" data-tab="frames" onclick="Hive.detailTab('${id}','frames',this)">Çerçeveler (${frames.length})</button>
        <button class="tab" data-tab="queen" onclick="Hive.detailTab('${id}','queen',this)">Ana Arı</button>
        <button class="tab" data-tab="history" onclick="Hive.detailTab('${id}','history',this)">Geçmiş (${inspections.length+harvests.length+feedings.length+treatments.length+diseases.length})</button>
      </div>
      <div id="hive-tab-content"></div>
    `;
    document.getElementById('view-hive-detail').innerHTML=html;
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    document.getElementById('view-hive-detail').classList.add('active');
    document.querySelectorAll('.nav,.bnav').forEach(n=>n.classList.remove('active'));
    document.getElementById('page-title').textContent=h.name;
    document.getElementById('page-subtitle').textContent=H.esc(apiary?apiary.name:'');
    window.scrollTo(0,0);
    Hive.detailTab(id,'frames');
  },
  detailTab(id,tab,btn){
    if(btn)document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    if(btn)btn.classList.add('active');
    const el=document.getElementById('hive-tab-content');
    if(tab==='frames'){
      const frames=Data.state.frames.filter(f=>f.hiveId===id).sort((a,b)=>a.position-b.position);
      const summary={brood:0,honey:0,pollen:0,foundation:0,empty:0};
      frames.forEach(f=>summary[f.frameType]=(summary[f.frameType]||0)+1);
      el.innerHTML=`
        <div class="card">
          <div class="card-h"><div><div class="card-title">Çerçeve Haritası</div><div class="card-sub">Petek döngüsü ve durum</div></div>
          <div style="display:flex;gap:6px"><button class="btn btn-sm" onclick="Frame.resetAll('${id}')">Sezonu Sıfırla</button><button class="btn btn-sm" onclick="Frame.exportCSV('${id}')">CSV</button></div></div>
          <div class="frame-grid">
            ${frames.map(f=>`<div class="frame ${f.frameType}${f.cyclesCompleted>=5?' retired':''}" onclick="Frame.edit('${f.id}','${id}')"><div class="frame-ico">${H.frameIco(f.frameType)}</div><div class="frame-num">#${f.position}</div><div class="frame-cycle">×${f.cyclesCompleted}</div></div>`).join('')}
          </div>
          <div class="frame-legend">
            <div class="legend-item"><span class="legend-dot" style="background:rgba(249,115,22,0.4)"></span>${summary.brood||0} Yumurtalık</div>
            <div class="legend-item"><span class="legend-dot" style="background:rgba(244,180,0,0.4)"></span>${summary.honey||0} Bal</div>
            <div class="legend-item"><span class="legend-dot" style="background:rgba(168,85,247,0.4)"></span>${summary.pollen||0} Polen</div>
            <div class="legend-item"><span class="legend-dot" style="background:var(--surface3)"></span>${summary.foundation||0} Perga</div>
            <div class="legend-item"><span class="legend-dot" style="background:transparent;border:1px dashed var(--border-strong)"></span>${summary.empty||0} Boş</div>
            <div class="legend-item" style="margin-left:auto;color:var(--red)"><span class="legend-dot" style="background:var(--red)"></span>🔴 Değişim (≥5 döngü)</div>
          </div>
        </div>
      `;
    } else if(tab==='queen'){
      const q=Data.state.queens.find(q=>q.id===Data.get('hives',id).queenId);
      el.innerHTML=`
        <div class="grid-2">
          <div class="card">
            <div class="card-h"><div class="card-title">Ana Arı Bilgileri</div><button class="btn btn-sm" onclick="Queen.edit('${q?q.id:''}')">Düzenle</button></div>
            ${q?`
              <div style="display:flex;align-items:center;gap:16px;margin-bottom:14px">
                <div style="width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--honey),var(--honey-3));display:flex;align-items:center;justify-content:center;font-size:30px">👑</div>
                <div>
                  <div style="font-size:16px;font-weight:700">${H.esc(q.strain)}</div>
                  <div style="font-size:12px;color:var(--text-dim)">İşaret: <strong>${H.colorTr(q.markedColor)}</strong> · Kaynak: ${H.sourceTr(q.source)}</div>
                </div>
              </div>
              <div class="row"><div class="row-main"><div class="row-name">Doğum</div><div class="row-info">${H.dateStr(q.birthDate)}</div></div></div>
              <div class="row"><div class="row-main"><div class="row-name">Yaş</div><div class="row-info">${((Date.now()-new Date(q.birthDate).getTime())/(365*864e5)).toFixed(1)} yıl</div></div></div>
              <div class="row"><div class="row-main"><div class="row-name">Performans Skoru</div><div class="row-info">${(q.performanceScore*100).toFixed(0)}%</div></div></div>
              <div class="row"><div class="row-main"><div class="row-name">Durum</div><div class="row-info">${H.statusBadge(q.status)}</div></div></div>
              ${q.supplier?`<div class="row"><div class="row-main"><div class="row-name">Tedarikçi</div><div class="row-info">${H.esc(q.supplier)}</div></div></div>`:''}
            `:'<div class="empty-state">Bu kovanda henüz ana arı kaydı yok.<br><button class="btn btn-primary" onclick="Queen.add(\''+id+'\')" style="margin-top:10px">Ana Arı Ekle</button></div>'}
          </div>
          <div class="card">
            <div class="card-title">📊 Performans Skoru</div>
            <div style="margin-top:14px;padding:20px;background:var(--surface2);border-radius:var(--r);text-align:center">
              <div style="font-size:48px;font-weight:800;color:var(--honey)">${q?(q.performanceScore*100).toFixed(0):0}%</div>
              <div style="font-size:12px;color:var(--text-dim);margin-top:4px">Mevcut Skor (0-100)</div>
            </div>
          </div>
        </div>
      `;
    } else if(tab==='history'){
      const events=[];
      inspections.forEach(i=>events.push({date:i.date,icon:'📋',title:'Muayene',sub:`Varroa: ${i.varroaCount}, ${H.popTr(i.population)}, Yavru: ${i.broodFrames} çerçeve${i.notes?' — '+i.notes:''}`,type:'inspection',id:i.id}));
      harvests.forEach(h=>events.push({date:h.date,icon:'🍯',title:'Bal Hasadı',sub:`${h.weight} kg · ${h.quality} kalite · ${h.frames} çerçeve`,type:'harvest',id:h.id}));
      feedings.forEach(f=>events.push({date:f.date,icon:'🌾',title:'Besleme',sub:`${H.typeTr(f.type)} · ${f.amountKg} kg · ${H.reasonTr(f.reason)}`,type:'feeding',id:f.id}));
      treatments.forEach(t=>events.push({date:t.date,icon:'💊',title:'Tedavi',sub:`${t.product} · ${t.dosage} · ${t.duration}`,type:'treatment',id:t.id}));
      diseases.forEach(d=>events.push({date:d.date,icon:'🦠',title:'Hastalık',sub:`${H.diseaseTr(d.disease)} · Şiddet: ${d.severity}`,type:'disease',id:d.id}));
      events.sort((a,b)=>b.date.localeCompare(a.date));
      el.innerHTML=`
        <div class="card">
          <div class="card-h"><div class="card-title">Zaman Çizelgesi</div><div style="display:flex;gap:6px">
            <button class="btn btn-sm btn-primary" onclick="Inspection.add('${id}')">+ Muayene</button>
            <button class="btn btn-sm" onclick="Harvest.add('${id}')">+ Hasat</button>
            <button class="btn btn-sm" onclick="Feeding.add('${id}')">+ Besleme</button>

          ${!events.length?'<div class="empty-state"><div class="empty-ico">📅</div><div class="empty-title">Henüz kayıt yok</div></div>':''}

        </div>
      `;
    }
  }
};

// FRAME
const Frame={
  edit(frameId,hiveId){
    const f=Data.state.frames.find(x=>x.id===frameId);if(!f)return;
    Modal.open('Çerçeve #'+f.position,
      `<div class="field"><span>Tip</span><select name="frameType">${['brood','honey','pollen','foundation','empty'].map(t=>`<option value="${t}"${f.frameType===t?' selected':''}>${H.frameTr(t)}</option>`).join('')}</select></div>
       <div class="field-row"><label class="field"><span>Temel Tipi</span><select name="foundationType"><option value="wax"${f.foundationType==='wax'?' selected':''}>Mum</option><option value="plastic"${f.foundationType==='plastic'?' selected':''}>Plastik</option><option value="foundationless"${f.foundationType==='foundationless'?' selected':''}>Temesiz</option></select></label>
       <label class="field"><span>Durum</span><select name="status">${['in_use','extracted','cleaning','stored','retired'].map(s=>`<option value="${s}"${f.status===s?' selected':''}>${s}</option>`).join('')}</select></label></div>
       <div class="field-row"><label class="field"><span>Döngü</span><input name="cyclesCompleted" type="number" min="0" value="${f.cyclesCompleted}"></label>
       <label class="field"><span>Yaş (ay)</span><input name="waxAgeMonths" type="number" min="0" value="${f.waxAgeMonths||0}"></label></div>
       <label class="field"><span>Son Hasat</span><input name="lastExtractedAt" type="date" value="${f.lastExtractedAt||''}"></label>`,
      d=>{Data.update('frames',frameId,d);App.toast('Çerçeve güncellendi ✓','success');Hive.detailTab(hiveId,'frames');return true}
    );
  },
  resetAll(hiveId){
    Modal.confirm('Tüm çerçeveler sıfırlanacak. Onaylıyor musunuz?',()=>{
      Data.state.frames.filter(f=>f.hiveId===hiveId).forEach(f=>{f.frameType='foundation';f.cyclesCompleted=0;f.waxAgeMonths=0;f.updatedAt=new Date().toISOString();});
      Data.save();App.toast('Sezon sıfırlandı','success');Hive.detailTab(hiveId,'frames');
    });
  },
  exportCSV(hiveId){
    const frames=Data.state.frames.filter(f=>f.hiveId===hiveId);
    let csv='Pozisyon,Tip,Temel,Durum,Dongu,Yas(ay)\n';
    frames.forEach(f=>csv+=`${f.position},${H.frameTr(f.frameType)},${f.foundationType},${f.status},${f.cyclesCompleted},${f.waxAgeMonths||0}\n`);
    const blob=new Blob([csv],{type:'text/csv'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='kovan-'+hiveId+'-cerceveler.csv';
    a.click();
    App.toast('CSV indirildi','success');
  }
};

  _renderHarvestChart(){
    const harvests=Data.state.harvests;

    const months=Object.keys(byMonth).sort().slice(-6);

    return `<div class="chart">${months.map(m=>{const v=byMonth[m];const height=Math.max(4,(v/max)*100);const label=monthNames[parseInt(m.split('-')[1])-1];return `<div class="chart-col"><div class="chart-val">${H.fmt(v)}kg</div><div class="chart-bar" style="height:${height}%"></div><div class="chart-lbl">${label}</div></div>`;}).join('')}</div>`;
  },

        <div class="stat"><div class="stat-ico" style="background:var(--blue-soft);color:var(--blue)">📋</div><div class="stat-label">Muayene</div><div class="stat-val">${inspCount}</div><div class="stat-meta neutral">toplam</div></div>
      </div>
      <div class="grid-2">
        <div class="card"><div class="card-h"><div class="card-title">Varroa Dağılımı</div></div>${this._renderVarroaChart()}</div>
        <div class="card"><div class="card-h"><div class="card-title">Üs Performansı</div></div>${this._renderApiaryChart()}</div>
      </div>
      <div class="card" style="margin-top:14px">
        <div class="card-h"><div class="card-title">Kovan Performans Tablosu</div></div>
        <div style="overflow-x:auto">
          <table style="width:100%;border-collapse:collapse;font-size:13px">
            <thead><tr style="background:var(--surface2)">
              <th style="padding:10px;text-align:left;font-weight:600">Kovan</th>
              <th style="padding:10px;text-align:left">Üs</th>
              <th style="padding:10px;text-align:left">Irk</th>
              <th style="padding:10px;text-align:right">Bal</th>
              <th style="padding:10px;text-align:right">Varroa</th>
              <th style="padding:10px;text-align:right">Skor</th>
              <th style="padding:10px;text-align:center">Son Muayene</th>
            </tr></thead>
            <tbody>${s.hives.map(h=>{const a=Data.get('apiaries',h.apiaryId);const q=s.queens.find(q=>q.id===h.queenId);const honey=s.harvests.filter(hv=>hv.hiveId===h.id).reduce((s,hv)=>s+hv.weight,0);const last=s.inspections.filter(i=>i.hiveId===h.id).sort((a,b)=>b.date.localeCompare(a.date))[0];return `<tr style="border-bottom:1px solid var(--border);cursor:pointer" onclick="Hive.detail('${h.id}')"><td style="padding:10px;font-weight:600">${H.esc(h.name)}</td><td style="padding:10px;color:var(--text-dim)">${H.esc(a?a.name:'-')}</td><td style="padding:10px">${H.strainTr(h.strain)}</td><td style="padding:10px;text-align:right;font-weight:600;color:var(--honey)">${H.fmt(honey)}</td><td style="padding:10px;text-align:right;font-weight:600;color:${last&&last.varroaCount>=6?'var(--red)':(last&&last.varroaCount>=3?'var(--orange)':'var(--green)')}">${last?last.varroaCount:'-'}</td><td style="padding:10px;text-align:right;color:${q&&q.performanceScore>=0.7?'var(--green)':(q&&q.performanceScore>=0.5?'var(--honey)':'var(--red)')}">${q?(q.performanceScore*100).toFixed(0)+'%':'-'}</td><td style="padding:10px;text-align:center;color:var(--text-dim)">${last?H.dateAgo(last.date):'-'}</td></tr>`;}).join('')}</tbody>
          </table>
        </div>

    `;
  },
  _renderVarroaChart(){
    const s=Data.state;
    if(!s.hives.length)return'<div class="empty-state">Veri yok</div>';
    const hivesWith=s.hives.map(h=>{const last=s.inspections.filter(i=>i.hiveId===h.id).sort((a,b)=>b.date.localeCompare(a.date))[0];return{name:h.name,varroa:last?last.varroaCount:0};}).sort((a,b)=>b.varroa-a.varroa);
    const max=Math.max(...hivesWith.map(h=>h.varroa),1);
    return `<div style="display:flex;flex-direction:column;gap:6px;margin-top:8px">${hivesWith.map(h=>{const pct=Math.max(4,(h.varroa/max)*100);const cls=h.varroa>=6?'danger':(h.varroa>=3?'warn':'ok');return `<div style="display:flex;align-items:center;gap:10px"><div style="font-size:12px;font-weight:600;width:80px;color:var(--text-dim)">${H.esc(h.name)}</div><div style="flex:1;background:var(--surface2);height:24px;border-radius:var(--r-sm);overflow:hidden;position:relative"><div class="chart-bar ${cls}" style="height:100%;width:${pct}%;max-width:none;border-radius:0"></div></div><div style="font-size:13px;font-weight:700;width:40px;text-align:right;color:${h.varroa>=6?'var(--red)':(h.varroa>=3?'var(--orange)':'var(--green)')}">${h.varroa}</div></div>`;}).join('')}</div>`;
  },
  _renderApiaryChart(){
    const s=Data.state;
    if(!s.apiaries.length)return'<div class="empty-state">Veri yok</div>';
    const data=s.apiaries.map(a=>{const hives=s.hives.filter(h=>h.apiaryId===a.id);const honey=s.harvests.filter(h=>h.apiaryId===a.id).reduce((s,h)=>s+h.weight,0);return{name:a.name,honey,kovan:hives.length};});
    const max=Math.max(...data.map(d=>d.honey),1);
    return `<div style="display:flex;flex-direction:column;gap:10px;margin-top:8px">${data.map(d=>`<div><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:12px;font-weight:600">${H.esc(d.name)} <span style="color:var(--text-dim);font-weight:400">(${d.kovan} kovan)</span></span><span style="font-size:13px;font-weight:700;color:var(--honey)">${H.fmt(d.honey)} kg</span></div><div style="background:var(--surface2);height:18px;border-radius:var(--r-sm);overflow:hidden"><div style="background:linear-gradient(90deg,var(--honey),var(--honey-3));height:100%;width:${Math.max(4,(d.honey/max)*100)}%;transition:var(--t)"></div></div></div>`).join('')}</div>`;
  },
  reports(){
    const s=Data.state;
    const templates=[
      {icon:'📊',name:'Aylık Performans',desc:'Tüm kovanların aylık özeti',color:'var(--honey)'},
      {icon:'⚠️',name:'Sağlık Raporu',desc:'Varroa, hastalık ve tedavi durumu',color:'var(--red)'},
      {icon:'👑',name:'Ana Arı Performans',desc:'Tüm ana arıların karşılaştırması',color:'var(--purple)'},
      {icon:'📦',name:'Envanter Raporu',desc:'Stok durumu ve uyarılar',color:'var(--blue)'},
      {icon:'💰',name:'Gelir/Gider Analizi',desc:'Maliyet ve verim özeti',color:'var(--green)'},
      {icon:'📅',name:'Sezonluk Özet',desc:'Tüm yılın performansı',color:'var(--orange)'}
    ];
    return `<div class="actions-bar"><div><h2 style="font-size:18px;font-weight:700">Raporlar</h2><div style="color:var(--text-dim);font-size:12px;margin-top:2px">Hazır şablonlar</div></div></div><div class="grid-3">${templates.map(t=>`<div class="card" style="cursor:pointer;text-align:center" onclick="Reports.show('${t.name}')"><div style="font-size:42px;margin-bottom:10px">${t.icon}</div><div style="font-size:14px;font-weight:700;margin-bottom:4px">${t.name}</div><div style="font-size:11.5px;color:var(--text-dim)">${t.desc}</div></div>`).join('')}</div>`;
  },
  settings(){
    const settings=[{icon:'👤',name:'Kullanıcı',desc:'Profil, şifre'},{icon:'🌍',name:'Bölge & Konum',desc:'Eğil, Diyarbakır'},{icon:'🔔',name:'Bildirimler',desc:'Hatırlatıcılar'},{icon:'📡',name:'Senkronizasyon',desc:'Bulut yedekleme'},{icon:'🎨',name:'Tema & Görünüm',desc:'Koyu/Açık mod'},{icon:'💾',name:'Veri',desc:'Dışa/içe aktar, sıfırla'},{icon:'ℹ️',name:'Hakkında',desc:'BeeMaster AI v2.0'}];
    return `<div class="actions-bar"><div><h2 style="font-size:18px;font-weight:700">Ayarlar</h2><div style="color:var(--text-dim);font-size:12px;margin-top:2px">Uygulama ve hesap ayarları</div></div></div><div class="grid-3">${settings.map(s=>`<div class="card" style="cursor:pointer"><div style="display:flex;align-items:center;gap:12px"><div style="width:42px;height:42px;border-radius:var(--r);background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:20px">${s.icon}</div><div><div style="font-size:14px;font-weight:700">${s.name}</div><div style="font-size:11.5px;color:var(--text-dim)">${s.desc}</div></div></div></div>`).join('')}</div><div class="card" style="margin-top:14px"><div class="card-title">Veri Yönetimi</div><div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap"><button class="btn" onclick="App.exportData()">📥 Dışa Aktar (JSON)</button><button class="btn" onclick="App.importData()">📤 İçe Aktar</button><button class="btn btn-danger" onclick="App.resetData()">🗑️ Tüm Veriyi Sıfırla</button></div></div>`;
  }
};

// REPORTS
const Reports={
  show(type){
    const s=Data.state;
    let html='';
    if(type==='Aylık Performans'){
      html=`<div style="padding:20px"><h2 style="margin-bottom:14px">Aylık Performans — ${new Date().toLocaleDateString('tr-TR',{month:'long',year:'numeric'})}</h2><div class="kpi-row"><div class="kpi"><div class="kpi-val">${s.hives.length}</div><div class="kpi-lbl">Aktif Kovan</div></div><div class="kpi"><div class="kpi-val">${s.harvests.reduce((s,h)=>s+h.weight,0).toFixed(1)} kg</div><div class="kpi-lbl">Toplam Bal</div></div><div class="kpi"><div class="kpi-val">${s.inspections.length}</div><div class="kpi-lbl">Muayene</div></div><div class="kpi"><div class="kpi-val">${s.treatments.filter(t=>t.status==='in_progress').length}</div><div class="kpi-lbl">Aktif Tedavi</div></div></div><h3 style="margin:18px 0 8px">Üs Bazında Verim</h3>${s.apiaries.map(a=>{const honey=s.harvests.filter(h=>h.apiaryId===a.id).reduce((s,h)=>s+h.weight,0);return `<div class="row"><div class="row-main"><div class="row-name">${H.esc(a.name)}</div><div class="row-info">${s.hives.filter(h=>h.apiaryId===a.id).length} kovan</div></div><div style="font-weight:700;color:var(--honey)">${honey.toFixed(1)} kg</div></div>`;}).join('')}</div>`;
    } else if(type==='Sağlık Raporu'){
      const dangers=s.hives.filter(h=>{const last=s.inspections.filter(i=>i.hiveId===h.id).sort((a,b)=>b.date.localeCompare(a.date))[0];return last&&last.varroaCount>=6;});
      html=`<div style="padding:20px"><h2 style="margin-bottom:14px">Sağlık Raporu — ${H.today()}</h2><div class="kpi-row"><div class="kpi"><div class="kpi-val" style="color:var(--red)">${dangers.length}</div><div class="kpi-lbl">⚠️ Kritik</div></div><div class="kpi"><div class="kpi-val" style="color:var(--orange)">${s.inspections.filter(i=>{const last=s.inspections.filter(x=>x.hiveId===i.hiveId).sort((a,b)=>b.date.localeCompare(a.date))[0];return last===i&&i.varroaCount>=3&&i.varroaCount<6;}).length}</div><div class="kpi-lbl">İzleme</div></div><div class="kpi"><div class="kpi-val">${s.diseases.length}</div><div class="kpi-lbl">Hastalık</div></div><div class="kpi"><div class="kpi-val">${s.treatments.filter(t=>t.status==='in_progress').length}</div><div class="kpi-lbl">Aktif Tedavi</div></div></div>${dangers.length?'<h3 style="margin-top:18px;color:var(--red)">⚠️ Acil Müdahale</h3>'+dangers.map(h=>{const last=s.inspections.filter(i=>i.hiveId===h.id).sort((a,b)=>b.date.localeCompare(a.date))[0];return `<div class="row"><div class="dot dot-r"></div><div class="row-main"><div class="row-name">${H.esc(h.name)}</div><div class="row-info">Son varroa: ${last.varroaCount} (${H.dateStr(last.date)})</div></div></div>`;}).join(''):''}</div>`;
    } else if(type==='Ana Arı Performans'){
      html=`<div style="padding:20px"><h2 style="margin-bottom:14px">Ana Arı Performans</h2>${s.queens.map(q=>{const h=Data.get('hives',q.hiveId);const age=((Date.now()-new Date(q.birthDate).getTime())/(365*864e5)).toFixed(1);const honey=s.harvests.filter(hv=>hv.hiveId===q.hiveId).reduce((s,hv)=>s+hv.weight,0);return `<div class="card" style="margin-bottom:10px"><div class="row" style="padding:0;border:none"><div style="width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--honey),var(--honey-3));display:flex;align-items:center;justify-content:center;font-size:24px">👑</div><div class="row-main"><div class="row-name">${H.esc(h?h.name:'?')} — ${H.strainTr(q.strain)}</div><div class="row-info">Yaş: ${age} yıl · Verim: ${honey.toFixed(1)} kg</div></div><div style="text-align:right"><div style="font-size:24px;font-weight:800;color:${q.performanceScore>=0.7?'var(--green)':(q.performanceScore>=0.5?'var(--honey)':'var(--red)')}">${(q.performanceScore*100).toFixed(0)}%</div><div style="font-size:10px;color:var(--text-dim)">performans</div></div></div></div>`;}).join('')}</div>`;
    } else if(type==='Envanter Raporu'){
      const total=s.inventory.reduce((s,i)=>s+(i.quantity*(i.costTry||0)),0);
      const low=s.inventory.filter(i=>i.quantity<=i.minStock);
      html=`<div style="padding:20px"><h2 style="margin-bottom:14px">Envanter Raporu</h2><div class="kpi-row"><div class="kpi"><div class="kpi-val">${s.inventory.length}</div><div class="kpi-lbl">Kalem</div></div><div class="kpi"><div class="kpi-val">₺${total.toFixed(0)}</div><div class="kpi-lbl">Değer</div></div><div class="kpi"><div class="kpi-val" style="color:var(--red)">${low.length}</div><div class="kpi-lbl">Düşük</div></div></div>${low.length?'<h3 style="margin-top:18px;color:var(--red)">⚠️ Düşük Stok</h3>'+low.map(i=>`<div class="row"><div class="dot dot-r"></div><div class="row-main"><div class="row-name">${H.esc(i.name)}</div><div class="row-info">${i.quantity} ${i.unit} / min ${i.minStock}</div></div></div>`).join(''):''}<h3 style="margin-top:18px">Tüm Stok</h3>${s.inventory.map(i=>`<div class="row"><div class="dot ${i.quantity<=i.minStock?'dot-r':'dot-g'}"></div><div class="row-main"><div class="row-name">${H.esc(i.name)}</div><div class="row-info">${H.inventoryCatTr(i.category)} · ₺${i.costTry||0}/${i.unit}</div></div><div style="font-weight:700">${i.quantity} ${i.unit}</div></div>`).join('')}</div>`;
    } else if(type==='Gelir/Gider Analizi'){
      const treatCost=s.treatments.length*85;
      const feedCost=s.feedings.reduce((s,f)=>s+f.amountKg*12,0);
      const honey=s.harvests.reduce((s,h)=>s+h.weight,0);
      const revenue=honey*250;
      html=`<div style="padding:20px"><h2 style="margin-bottom:14px">Gelir/Gider Analizi</h2><div class="kpi-row"><div class="kpi"><div class="kpi-val" style="color:var(--green)">₺${revenue.toFixed(0)}</div><div class="kpi-lbl">Tahmini Gelir</div></div><div class="kpi"><div class="kpi-val" style="color:var(--red)">₺${(treatCost+feedCost).toFixed(0)}</div><div class="kpi-lbl">Tahmini Gider</div></div><div class="kpi"><div class="kpi-val">₺${(revenue-treatCost-feedCost).toFixed(0)}</div><div class="kpi-lbl">Net</div></div></div><div class="card" style="margin-top:14px"><div class="row"><div class="row-main"><div class="row-name">Bal Hasadı</div><div class="row-info">${honey.toFixed(1)} kg × ₺250</div></div><div style="color:var(--green);font-weight:700">+₺${revenue.toFixed(0)}</div></div><div class="row"><div class="row-main"><div class="row-name">Tedavi</div><div class="row-info">${s.treatments.length} işlem × ₺85</div></div><div style="color:var(--red);font-weight:700">-₺${treatCost.toFixed(0)}</div></div><div class="row"><div class="row-main"><div class="row-name">Besleme</div><div class="row-info">${s.feedings.reduce((s,f)=>s+f.amountKg,0).toFixed(1)} kg × ₺12</div></div><div style="color:var(--red);font-weight:700">-₺${feedCost.toFixed(0)}</div></div></div></div>`;
    } else if(type==='Sezonluk Özet'){
      const totalHoney=s.harvests.reduce((s,h)=>s+h.weight,0);
      const totalInsp=s.inspections.length;
      const months=new Set(s.harvests.map(h=>h.date.slice(0,7))).size;
      html=`<div style="padding:20px"><h2 style="margin-bottom:14px">Sezonluk Özet — 2026</h2><div class="kpi-row"><div class="kpi"><div class="kpi-val">${totalHoney.toFixed(1)} kg</div><div class="kpi-lbl">Toplam Bal</div></div><div class="kpi"><div class="kpi-val">${totalInsp}</div><div class="kpi-lbl">Muayene</div></div><div class="kpi"><div class="kpi-val">${months}</div><div class="kpi-lbl">Aktif Ay</div></div><div class="kpi"><div class="kpi-val">${(totalHoney/Math.max(months,1)).toFixed(1)}</div><div class="kpi-lbl">kg/Ay</div></div></div>${Renderers._renderHarvestChart()}</div>`;
    }
    App.showReport(html);
  }
};

// APP
const App={
  currentView:'dashboard',
  currentHiveId:null,
  nav(view){
    this.currentView=view;
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    document.querySelectorAll('.nav,.bnav').forEach(n=>n.classList.remove('active'));
    const el=document.getElementById('view-'+view);
    if(el)el.classList.add('active');
    document.querySelectorAll(`[data-view="${view}"]`).forEach(n=>{if(n.classList.contains('nav')||n.classList.contains('bnav'))n.classList.add('active');});
    const titles={dashboard:['Dashboard','Genel bakış · Eğil, Diyarbakır'],apiaries:['Arı Üsleri',Data.state.apiaries.length+' üs · '+Data.state.hives.length+' kovan'],hives:['Kovanlar',Data.state.hives.length+' aktif kovan'],inspections:['Muayeneler',Data.state.inspections.length+' kayıt'],harvest:['Bal Hasadı',Data.state.harvests.reduce((s,h)=>s+h.weight,0).toFixed(1)+' kg'],feeding:['Besleme',Data.state.feedings.length+' kayıt'],treatments:['Tedaviler',Data.state.treatments.length+' kayıt'],diseases:['Hastalıklar',Data.state.diseases.length+' kayıt'],queens:['Ana Arılar',Data.state.queens.length+' ana arı'],inventory:['Envanter',Data.state.inventory.length+' malzeme'],analytics:['Analitik','Tüm verilerden içgörüler'],reports:['Raporlar','Hazır şablonlar'],settings:['Ayarlar','Uygulama ve veri yönetimi']};
    const t=titles[view]||[view,''];
    document.getElementById('page-title').textContent=t[0];
    document.getElementById('page-subtitle').textContent=t[1];
    this.render(view);
    if(history.pushState)history.pushState({view},'','#'+view);
    window.scrollTo(0,0);
  },
  render(view){
    const r=Renderers[view];
    if(r){const el=document.getElementById('view-'+view);if(el)el.innerHTML=r.call(Renderers);}
  },
  toast(msg,type='info'){
    const c=document.getElementById('toast-container');
    const t=document.createElement('div');t.className='toast '+type;t.textContent=msg;
    c.appendChild(t);
    setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),300)},3000);
  },
  toggleTheme(){
    const cur=document.documentElement.getAttribute('data-theme')||'dark';
    const next=cur==='dark'?'light':'dark';
    document.documentElement.setAttribute('data-theme',next);
    document.getElementById('theme-toggle').textContent=next==='dark'?'🌙':'☀️';
    try{localStorage.setItem('bm-theme',next)}catch(e){}
  },
  quickAdd(){
    Modal.open('Hızlı Ekle','<div style="display:grid;gap:8px"><button class="btn" onclick="Modal.close();setTimeout(()=>Hive.add(),200)">🏠 Yeni Kovan</button><button class="btn" onclick="Modal.close();setTimeout(()=>Apiary.add(),200)">📍 Yeni Üs</button><button class="btn" onclick="Modal.close();setTimeout(()=>Inspection.add(),200)">📋 Yeni Muayene</button><button class="btn" onclick="Modal.close();setTimeout(()=>Harvest.add(),200)">🍯 Yeni Hasat</button><button class="btn" onclick="Modal.close();setTimeout(()=>Feeding.add(),200)">🌾 Yeni Besleme</button><button class="btn" onclick="Modal.close();setTimeout(()=>Treatment.add(),200)">💊 Yeni Tedavi</button><button class="btn" onclick="Modal.close();setTimeout(()=>Queen.add(),200)">👑 Yeni Ana Arı</button><button class="btn" onclick="Modal.close();setTimeout(()=>Inventory.add(),200)">📦 Yeni Malzeme</button></div>',()=>true);
  },
  showReport(html){Modal.open('Rapor',html,()=>true);},
  exportData(){
    const blob=new Blob([JSON.stringify(Data.state,null,2)],{type:'application/json'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='beemaster-backup-'+H.today()+'.json';
    a.click();
    this.toast('Veri dışa aktarıldı ✓','success');
  },
  importData(){
    const input=document.createElement('input');input.type='file';input.accept='.json,application/json';
    input.onchange=e=>{
      const file=e.target.files[0];if(!file)return;
      const reader=new FileReader();
      reader.onload=ev=>{
        try{
          const data=JSON.parse(ev.target.result);
          if(!data.apiaries||!data.hives)throw new Error('Geçersiz format');
          Modal.confirm('Mevcut veriler değiştirilecek. Devam edilsin mi?',()=>{Data.state=data;Data.save();this.toast('Veri içe aktarıldı ✓','success');this.render(this.currentView);});
        }catch(err){this.toast('Geçersiz dosya: '+err.message,'error');}
      };
      reader.readAsText(file);
    };
    input.click();
  },
  resetData(){
    Modal.confirm('⚠️ TÜM veriler silinecek ve örnek verilerle değiştirilecek. Bu işlem geri alınamaz!',()=>{
      localStorage.removeItem(STORAGE_KEY);Data.seed();
      this.toast('Veriler sıfırlandı','info');this.nav('dashboard');
    });
  }
};

// INIT
(function(){
  if('serviceWorker' in navigator){navigator.serviceWorker.getRegistrations().then(regs=>regs.forEach(r=>r.unregister()));}
  try{const saved=localStorage.getItem('bm-theme');if(saved){document.documentElement.setAttribute('data-theme',saved);const btn=document.getElementById('theme-toggle');if(btn)btn.textContent=saved==='dark'?'🌙':'☀️';}}catch(e){}
  document.addEventListener('keydown',e=>{if(e.key==='Escape')Modal.close();});
  window.addEventListener('popstate',e=>{const h=location.hash.slice(1);if(h)App.nav(h);});
  const h=location.hash.slice(1);
  App.nav(h||'dashboard');
  console.log('[BeeMaster AI v2.0] Spec-driven PWA · 12 modules · offline-first');
})();

</script>
