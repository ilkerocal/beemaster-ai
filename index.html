<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#07080C">
  <meta name="description" content="BeeMaster AI - Yapay zeka destekli arıcılık yönetim platformu">
  <title>🐝 BeeMaster AI - Arıcılık Yönetimi</title>

  <!-- Cache control — force fresh load -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json?v=3">
  <link rel="icon" type="image/svg+xml" href="icons/favicon.svg?v=3">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png?v=3">

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BeeMaster AI">

  <!-- Stylesheet (cache-busted) -->
  <link rel="stylesheet" href="css/app.css?v=3">

  <!-- Leaflet (Harita için — opsiyonel CDN) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="anonymous">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin="anonymous"></script>

  <!-- Initial loading screen — shown until JS loads -->
  <style>
    .boot-screen {
      position: fixed; inset: 0; z-index: 9999;
      background: #07080C; color: #E8EAF2;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      transition: opacity 0.3s;
    }
    .boot-screen.hidden { opacity: 0; pointer-events: none; }
    .boot-screen__logo { font-size: 64px; margin-bottom: 16px; animation: pulse 2s ease-in-out infinite; }
    .boot-screen__title { font-size: 24px; font-weight: 800; margin-bottom: 8px; background: linear-gradient(135deg, #fbbf24, #f59e0b); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .boot-screen__sub { font-size: 13px; color: #8A8FA3; margin-bottom: 32px; }
    .boot-screen__loader { width: 200px; height: 3px; background: #1F2330; border-radius: 2px; overflow: hidden; }
    .boot-screen__bar { height: 100%; background: linear-gradient(90deg, #fbbf24, #f59e0b); width: 30%; animation: slide 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    @keyframes slide { 0% { transform: translateX(-100%); } 100% { transform: translateX(400%); } }
    noscript { display: flex; align-items: center; justify-content: center; height: 100vh; background: #07080C; color: #E8EAF2; font-family: system-ui; }
  </style>
</head>
<body>
  <!-- Boot screen — instantly visible, hides when app loads -->
  <div class="boot-screen" id="boot-screen">
    <div class="boot-screen__logo">🐝</div>
    <div class="boot-screen__title">BeeMaster AI</div>
    <div class="boot-screen__sub">Arıcılık Yönetim Platformu</div>
    <div class="boot-screen__loader"><div class="boot-screen__bar"></div></div>
  </div>

  <noscript>
    <div style="text-align:center;padding:20px">
      <h1>🐝 BeeMaster AI</h1>
      <p>JavaScript gereklidir. Lütfen tarayıcınızda JS'yi etkinleştirin.</p>
    </div>
  </noscript>

  <div class="app">
    <aside class="sidebar" id="sidebar"></aside>

    <header class="header">
      <div class="page-title">
        <h1 id="page-title">Dashboard</h1>
        <p id="page-subtitle">Genel bakış · Eğil, Diyarbakır</p>
      </div>
      <div class="header-actions">
        <button class="btn btn--icon btn--ghost" onclick="BM.Toast.show('Arama yakında','info')" title="Ara">🔍</button>
        <button class="btn btn--icon btn--ghost" onclick="App.toggleTheme()" id="theme-toggle" title="Tema">🌙</button>
        <button class="btn btn--icon btn--ghost" onclick="BM.notify.check()" title="Bildirimler">🔔</button>
        <button class="btn btn--primary" onclick="App.quickAdd()">+ Ekle</button>
      </div>
    </header>

    <main class="main">
      <div class="main__inner">
        <div id="view-dashboard" class="view view--active"></div>
        <div id="view-apiaries" class="view"></div>
        <div id="view-hives" class="view"></div>
        <div id="view-hive-detail" class="view"></div>
        <div id="view-inspections" class="view"></div>
        <div id="view-harvest" class="view"></div>
        <div id="view-feeding" class="view"></div>
        <div id="view-treatments" class="view"></div>
        <div id="view-diseases" class="view"></div>
        <div id="view-queens" class="view"></div>
        <div id="view-inventory" class="view"></div>
        <div id="view-analytics" class="view"></div>
        <div id="view-reports" class="view"></div>
        <div id="view-settings" class="view"></div>
      </div>
    </main>
  </div>

  <nav class="bottom-nav" id="bottom-nav"></nav>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)BM.Modal.close()">
    <div class="modal">
      <div class="modal__head">
        <div class="modal__title" id="modal-title">Başlık</div>
        <button type="button" class="modal__close" onclick="BM.Modal.close()" aria-label="Kapat">×</button>
      </div>
      <form id="modal-form" onsubmit="return false">
        <div class="modal__body" id="modal-body"></div>
        <div class="modal__foot">
          <button type="button" class="btn btn--ghost" onclick="BM.Modal.close()">İptal</button>
          <button type="submit" class="btn btn--primary" id="modal-submit">Kaydet</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Global error handler — shows errors on screen so user knows what's wrong -->
  <script>
    window.addEventListener('error', e => {
      console.error('JS Error:', e.error);
      const err = document.getElementById('js-error');
      if (err) {
        err.textContent = '⚠️ JS Hatası: ' + (e.error?.message || e.message);
        err.style.display = 'block';
      }
    });
  </script>

  <!-- Scripts (sıralama önemli) -->
  <script src="js/utils.js?v=3"></script>
  <script src="js/db.js?v=3"></script>
  <script src="js/ui.js?v=3"></script>
  <script src="js/modules/apiaries.js?v=3"></script>
  <script src="js/modules/hives.js?v=3"></script>
  <script src="js/modules/inspections.js?v=3"></script>
  <script src="js/modules/crud.js?v=3"></script>
  <script src="js/modules/dashboard.js?v=3"></script>
  <script src="js/app.js?v=3"></script>
  <script>
    // Hide boot screen once everything is loaded
    window.addEventListener('load', function() {
      setTimeout(function() {
        var boot = document.getElementById('boot-screen');
        if (boot) {
          boot.classList.add('hidden');
          setTimeout(function() { boot.remove(); }, 400);
        }
      }, 200);
    });

    // Init App
    try {
      App.init();
      console.log('[BeeMaster AI v3.0] Initialized OK');
    } catch (e) {
      console.error('App.init failed:', e);
      var boot = document.getElementById('boot-screen');
      if (boot) {
        boot.innerHTML = '<div style="color:#ef4444;text-align:center;padding:20px"><div style="font-size:48px;margin-bottom:12px">⚠️</div><div style="font-size:18px;font-weight:700;margin-bottom:8px">Yükleme Hatası</div><div style="font-size:13px;color:#8A8FA3;max-width:400px">' + (e.message || e) + '</div><button onclick="localStorage.clear();location.reload()" style="margin-top:20px;padding:10px 20px;background:#F4B400;color:#000;border:none;border-radius:8px;cursor:pointer;font-weight:600">Sayfayı Yenile & Cache Temizle</button></div>';
      }
    }
  </script>

  <!-- Error display -->
  <div id="js-error" style="display:none;position:fixed;top:0;left:0;right:0;background:#dc2626;color:white;padding:10px 20px;font-family:system-ui;font-size:13px;z-index:10000"></div>

  <!-- Service Worker (network-first, no cache) -->
  <script>
    if ('serviceWorker' in navigator) {
      // Unregister OLD SWs (they cause caching issues)
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        regs.forEach(function(reg) { reg.unregister(); });
      });
    }
  </script>
</body>
</html>
