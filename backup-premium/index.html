<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f59e0b">
  <title>🐝 BeeMaster AI — Arılık Yönetim Paneli</title>
  <meta name="description" content="Kanıta dayalı arıcılık karar destek sistemi. Arıcılık bilgi tabanı, kovan yönetimi, muayene kaydı, hastalık teşhisi.">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icons/favicon.svg">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/mobile.css">
</head>
<body>
  <!-- Skip link for accessibility -->
  <a class="skip-link" href="#main">İçeriğe geç</a>

  <!-- Header -->
  <header class="app-header">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true">🐝</div>
      <div class="brand-text">
        <h1>BeeMaster AI</h1>
        <p class="brand-sub">Kanıta dayalı arıcılık danışmanı</p>
      </div>
    </div>
    <nav class="header-nav" aria-label="Üst gezinme">
      <button class="icon-btn" id="btn-search" aria-label="Bilgi tabanında ara" title="Ara">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      </button>
      <button class="icon-btn" id="btn-export" aria-label="Veriyi dışa aktar" title="Dışa aktar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
      </button>
      <button class="icon-btn" id="btn-import" aria-label="Veriyi içe aktar" title="İçe aktar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
      </button>
      <button class="icon-btn" id="btn-settings" aria-label="Ayarlar" title="Ayarlar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </nav>
  </header>

  <!-- Layout -->
  <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Menüyü aç">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <div class="app-shell">
    <aside class="sidebar" aria-label="Yan menü">
      <nav class="side-nav">
        <a href="#/dashboard" class="side-link active" data-route="dashboard">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          <span>Pano</span>
        </a>
        <a href="#/hives" class="side-link" data-route="hives">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          <span>Kovanlarım</span>
        </a>
        <a href="#/inspections" class="side-link" data-route="inspections">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="15" y2="17"/></svg>
          <span>Muayeneler</span>
        </a>
        <a href="#/treatments" class="side-link" data-route="treatments">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          <span>Tedaviler</span>
        </a>
        <a href="#/harvests" class="side-link" data-route="harvests">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          <span>Hasılat</span>
        </a>
        <a href="#/advisor" class="side-link" data-route="advisor">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          <span>Danışman</span>
        </a>
        <a href="#/knowledge" class="side-link" data-route="knowledge">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
          <span>Bilgi Tabanı</span>
        </a>
        <a href="#/reports" class="side-link" data-route="reports">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          <span>Raporlar</span>
        </a>
        <a href="#/reminders" class="side-link" data-route="reminders">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span>Hatırlatıcılar</span>
          <span class="nav-badge" id="reminders-badge" style="display:none">0</span>
        </a>
      </nav>

      <div class="apiary-card">
        <div class="apiary-card-label">Aktif arılık</div>
        <select id="apiary-select" class="apiary-select" aria-label="Arılık seç"></select>
        <button class="btn-ghost-sm" id="btn-add-apiary">+ Yeni arılık</button>
      </div>
    </aside>

    <main id="main" class="main-content" tabindex="-1">
      <!-- Routes render here -->
      <div id="route-outlet" aria-live="polite"></div>
    </main>
  </div>

  <!-- Modal mount -->
  <div id="modal-root" class="modal-root" aria-hidden="true"></div>

  <!-- Toast mount -->
  <div id="toast-root" class="toast-root" aria-live="polite"></div>

  <!-- Templates (kept inline; HTML <template> tags) -->
  <template id="tpl-dashboard">
    <section class="route-dashboard">
      <header class="route-header">
        <div>
          <h2>Pano</h2>
          <p class="route-sub" data-bind="apiary-summary"></p>
        </div>
        <div class="route-actions">
          <button class="btn-primary" data-action="quick-inspection">+ Hızlı muayene</button>
          <button class="btn-secondary" data-action="ask-advisor">Danışmana sor</button>
        </div>
      </header>

      <!-- Risk grid -->
      <div class="risk-grid" data-bind="risk-grid"></div>

      <!-- Stats row -->
      <div class="stats-row" data-bind="stats-row"></div>

      <!-- Two columns -->
      <div class="two-col">
        <div class="card">
          <div class="card-head">
            <h3>Son olaylar</h3>
            <a href="#/inspections" class="card-link">Tümü →</a>
          </div>
          <div class="card-body" data-bind="recent-events">
            <div class="empty">Henüz kayıt yok. İlk muayenenizi ekleyin.</div>
          </div>
        </div>
        <div class="card">
          <div class="card-head">
            <h3>Yaklaşan görevler</h3>
            <a href="#/inspections" class="card-link">Tümü →</a>
          </div>
          <div class="card-body" data-bind="upcoming-tasks">
            <div class="empty">Yaklaşan görev yok.</div>
          </div>
        </div>
      </div>

      <!-- Hive list -->
      <div class="card">
        <div class="card-head">
          <h3>Kovanlarım</h3>
          <a href="#/hives" class="card-link">Tümü →</a>
        </div>
        <div class="hive-grid" data-bind="hive-grid"></div>
      </div>
    </section>
  </template>

  <template id="tpl-hives">
    <section class="route-hives">
      <header class="route-header">
        <div>
          <h2>Kovanlarım</h2>
          <p class="route-sub">Tüm kovanları yönet</p>
        </div>
        <div class="route-actions">
          <button class="btn-primary" data-action="add-hive">+ Yeni kovan</button>
        </div>
      </header>
      <div class="hive-grid" data-bind="hive-grid-full"></div>
    </section>
  </template>

  <template id="tpl-inspections">
    <section class="route-inspections">
      <header class="route-header">
        <div>
          <h2>Muayeneler</h2>
          <p class="route-sub">Muayene geçmişi ve yeni muayene</p>
        </div>
        <div class="route-actions">
          <button class="btn-primary" data-action="add-inspection">+ Yeni muayene</button>
        </div>
      </header>
      <div class="card">
        <div class="card-body" data-bind="inspection-list"></div>
      </div>
    </section>
  </template>

  <template id="tpl-treatments">
    <section class="route-treatments">
      <header class="route-header">
        <div>
          <h2>Tedaviler</h2>
          <p class="route-sub">Varroa, nosema ve diğer tedaviler</p>
        </div>
        <div class="route-actions">
          <button class="btn-primary" data-action="add-treatment">+ Tedavi kaydı</button>
        </div>
      </header>
      <div class="card">
        <div class="card-body" data-bind="treatment-list"></div>
      </div>
    </section>
  </template>

  <template id="tpl-harvests">
    <section class="route-harvests">
      <header class="route-header">
        <div>
          <h2>Hasılat</h2>
          <p class="route-sub">Yıllık bal hasılatı</p>
        </div>
        <div class="route-actions">
          <button class="btn-primary" data-action="add-harvest">+ Hasat kaydı</button>
        </div>
      </header>
      <div class="card">
        <div class="card-body" data-bind="harvest-list"></div>
      </div>
      <div class="card">
        <div class="card-head">
          <h3>Yıllık özet</h3>
        </div>
        <div class="card-body" data-bind="harvest-chart"></div>
      </div>
    </section>
  </template>

  <template id="tpl-advisor">
    <section class="route-advisor">
      <header class="route-header">
        <div>
          <h2>Danışman</h2>
          <p class="route-sub">BeeMaster AI karar motoru — sorunuzu yazın, fotoğraf ekleyin, kanıta dayalı cevap alın.</p>
        </div>
        <div class="route-actions">
          <select id="advisor-region" class="form-select" style="max-width:200px;">
            <!-- region options rendered by JS -->
          </select>
        </div>
      </header>

      <div class="region-banner" id="region-banner">
        <!-- seasonal context rendered by JS -->
      </div>

      <div class="advisor-layout">
        <div class="advisor-side card">
          <div class="card-head"><h3>Hızlı senaryolar</h3></div>
          <div class="card-body">
            <button class="scenario-btn" data-scenario="mite-count">🔬 Varroa sayımı</button>
            <button class="scenario-btn" data-scenario="queenless">👑 Ana arısız kovan</button>
            <button class="scenario-btn" data-scenario="swarm">🐝 Oğul riski</button>
            <button class="scenario-btn" data-scenario="feeding">🍯 Besleme planı</button>
            <button class="scenario-btn" data-scenario="afb-suspect">⚠️ AFB şüphesi</button>
            <button class="scenario-btn" data-scenario="winter-prep">❄️ Kışlama hazırlığı</button>
          </div>
          <div class="card-head" style="border-top:1px solid var(--c-border);"><h3>📷 Bu kovanın medyası</h3></div>
          <div class="card-body" id="advisor-media-list">
            <div class="empty" style="padding:var(--sp-3);">Henüz medya yok.</div>
          </div>
        </div>

        <div class="advisor-main">
          <div class="card">
            <div class="card-body">
              <textarea id="advisor-input" class="advisor-input" rows="3" placeholder="Örn: '3.5 mite/100 arı saydım, ana arı 11 aylık, ekim ayı başı. Tedavi gerekli mi?'"></textarea>

              <!-- Media attachments preview -->
              <div id="advisor-attachments" class="advisor-attachments" style="display:none;">
                <!-- thumbs rendered by JS -->
              </div>

              <div class="advisor-actions">
                <select id="advisor-hive" class="form-select"><option value="">— Kovan seç —</option></select>
                <label class="btn-secondary" for="advisor-media-input" title="Foto/Video ekle">
                  📷 Medya
                  <input type="file" id="advisor-media-input" accept="image/*,video/*" capture="environment" multiple style="display:none;">
                </label>
                <button class="btn-primary" id="btn-advisor-go">Danışmana sor</button>
              </div>
            </div>
          </div>

          <div class="advisor-output" id="advisor-output">
            <div class="advisor-empty">
              Cevap buraya gelecek.<br>
              <small style="font-size:0.8125rem;color:var(--c-text-soft);">
                Karar motoru: <strong>Durum → Kanıt → Tanı → Güven → Risk → Öncelik → Eylem → Beklenen Sonuç → Doğrulama</strong>
              </small>
            </div>
          </div>

          <!-- Doğrulama butonları — danışman çıktısı sonrası dolacak -->
          <div id="advisor-feedback" style="display:none;" class="advisor-feedback">
            <p>Bu tanı doğru muydu?</p>
            <div class="feedback-buttons">
              <button class="btn-secondary" id="feedback-correct">✓ Doğru</button>
              <button class="btn-secondary" id="feedback-wrong">✗ Yanlış</button>
              <button class="btn-ghost" id="feedback-pattern">📝 Pattern kaydet</button>
              <button class="btn-ghost" id="feedback-forum">🔍 Forum tara</button>
            </div>
          </div>

          <!-- Forum arama sonuçları -->
          <div id="advisor-forum-results" style="display:none;"></div>

          <!-- Pattern kayıt -->
          <div id="advisor-pattern-form" style="display:none;" class="card">
            <div class="card-head"><h3>📝 Gözlem kaydet (Pattern)</h3></div>
            <div class="card-body">
              <div class="form-row">
                <label class="form-label">Tür</label>
                <select id="pattern-type" class="form-select">
                  <option value="flow">🌸 Nektar akımı</option>
                  <option value="disease">🦠 Hastalık</option>
                  <option value="swarm">🐝 Oğul</option>
                  <option value="queen">👑 Ana arı</option>
                  <option value="feeding">🍯 Besleme</option>
                  <option value="climate">🌡️ İklim</option>
                  <option value="varroa">🔬 Varroa</option>
                </select>
              </div>
              <div class="form-row">
                <label class="form-label">Gözlem</label>
                <input id="pattern-observation" class="form-input" placeholder="Örn: Mayıs sonu geven zayıf, kekik zirve">
              </div>
              <div class="form-row">
                <label class="form-label">Notlar</label>
                <textarea id="pattern-notes" class="form-textarea" rows="2" placeholder="Detaylar..."></textarea>
              </div>
              <div class="advisor-actions">
                <button class="btn-secondary" id="pattern-cancel">İptal</button>
                <button class="btn-primary" id="pattern-save">Kaydet</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Bilgi tabanı ve öğrenme paneli -->
      <div class="card" style="margin-top:var(--sp-4);">
        <div class="card-head"><h3>📚 Sistemin öğrendikleri</h3></div>
        <div class="card-body" id="learning-summary"></div>
      </div>
    </section>
  </template>

  <template id="tpl-knowledge">
    <section class="route-knowledge">
      <header class="route-header">
        <div>
          <h2>Bilgi Tabanı</h2>
          <p class="route-sub">BeeMaster AI modülleri — kanıta dayalı referanslar.</p>
        </div>
        <div class="route-actions">
          <input type="search" id="kb-search" class="form-input" placeholder="Modülde ara...">
        </div>
      </header>

      <div class="kb-layout">
        <aside class="kb-side card">
          <div class="card-body" data-bind="kb-tree"></div>
        </aside>
        <article class="kb-main card">
          <div class="card-body" data-bind="kb-viewer">
            <div class="empty">Modül seçin veya arayın.</div>
          </div>
        </article>
      </div>
    </section>
  </template>

  <template id="tpl-reports">
    <section class="route-reports">
      <header class="route-header">
        <div>
          <h2>Raporlar</h2>
          <p class="route-sub">Tek tıkla profesyonel raporlar.</p>
        </div>
      </header>
      <div class="report-grid">
        <button class="report-card" data-report="apiary">
          <div class="report-icon">📋</div>
          <h3>Arılık Raporu</h3>
          <p>Genel durum, riskler, öneriler.</p>
        </button>
        <button class="report-card" data-report="inspection">
          <div class="report-icon">🔍</div>
          <h3>Muayene Raporu</h3>
          <p>Son muayene + karar özeti.</p>
        </button>
        <button class="report-card" data-report="queen">
          <div class="report-icon">👑</div>
          <h3>Ana Arı Raporu</h3>
          <p>Ana arı performansı, soy.</p>
        </button>
        <button class="report-card" data-report="disease">
          <div class="report-icon">🦠</div>
          <h3>Hastalık Raporu</h3>
          <p>Şüpheli hastalık değerlendirmesi.</p>
        </button>
        <button class="report-card" data-report="treatment">
          <div class="report-icon">💊</div>
          <h3>Tedavi Raporu</h3>
          <p>Tedavi geçmişi ve etkinlik.</p>
        </button>
        <button class="report-card" data-report="frame-cycle">
          <div class="report-icon">🐝</div>
          <h3>Çerçeve Döngüsü</h3>
          <p>Aylık çerçeve hareketleri özeti (verilen/alınan).</p>
        </button>
        <button class="report-card" data-report="annual">
          <div class="report-icon">📅</div>
          <h3>Yıllık Rapor</h3>
          <p>Yıl sonu değerlendirmesi.</p>
        </button>
      </div>
    </section>
  </template>

  <!-- Scripts -->
  <script src="js/db.js"></script>
  <script src="js/region.js"></script>
  <script src="js/decision-engine.js"></script>
  <script src="js/risk-engine.js"></script>
  <script src="js/knowledge-bundle.js"></script>
  <script src="js/learning.js"></script>
  <script src="js/forum-search.js"></script>
  <script src="js/media.js"></script>
  <script src="js/views.js"></script>
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
