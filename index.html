<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BeeMaster AI - Arıcılık Yönetimi</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--surface:#13131a;--surface2:#1a1a24;--border:#2a2a3a;--text:#e4e4ef;--text-dim:#8888a0;
  --honey:#F4B400;--honey2:#d99e00;--green:#22c55e;--red:#ef4444;--blue:#3b82f6;--purple:#a855f7;
  --r:12px;--r-sm:8px;--r-lg:16px;--shadow:0 4px 24px rgba(0,0,0,.4);
}
html{visibility:visible;opacity:1}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6;overflow-x:hidden}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.btn{padding:10px 18px;border:none;border-radius:var(--r-sm);cursor:pointer;font-size:14px;font-weight:600;transition:.2s;display:inline-flex;align-items:center;gap:6px;text-decoration:none}
.btn-primary{background:var(--honey);color:#000}.btn-primary:hover{background:var(--honey2)}
.btn-ghost{background:transparent;color:var(--text-dim);padding:8px}.btn-ghost:hover{color:var(--text);background:var(--surface2)}
.app{display:grid;grid-template-columns:240px 1fr;grid-template-rows:64px 1fr;min-height:100vh;grid-template-areas:"sidebar header" "sidebar main"}
.sidebar{grid-area:sidebar;background:var(--surface);border-right:1px solid var(--border);padding:16px 0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.logo{padding:0 20px 20px;display:flex;align-items:center;gap:10px;font-size:18px;font-weight:800;white-space:nowrap}
.logo .bee{font-size:24px}
.logo .brand{background:linear-gradient(135deg,var(--honey),var(--honey2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.sidebar nav{display:flex;flex-direction:column;gap:2px;padding:0 8px;flex:1}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--r-sm);cursor:pointer;color:var(--text-dim);font-size:14px;font-weight:500;text-decoration:none;border:none;background:transparent;width:100%;text-align:left;transition:.15s;font-family:inherit}
.nav-item:hover{color:var(--text);background:var(--surface2)}
.nav-item.active{background:rgba(244,180,0,.12);color:var(--honey);font-weight:600}
.nav-item .ico{width:18px;height:18px;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;font-size:16px;line-height:1}
.sidebar-foot{padding:12px 16px;margin-top:auto}
.user-card{display:flex;align-items:center;gap:10px;padding:10px;border-radius:var(--r);background:var(--surface2)}
.avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--honey),var(--honey2));display:flex;align-items:center;justify-content:center;font-weight:700;color:#000;font-size:14px}
.user-name{font-size:13px;font-weight:600}.user-role{font-size:11px;color:var(--text-dim)}
.header{grid-area:header;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:50}
.page-title h1{font-size:16px;font-weight:700;line-height:1.2}.page-title p{font-size:12px;color:var(--text-dim)}
.header-actions{display:flex;align-items:center;gap:10px}
.main{grid-area:main;padding:24px;overflow-x:auto}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;position:relative;overflow:hidden;transition:.2s}
.stat-card:hover{border-color:var(--honey);transform:translateY(-2px);box-shadow:var(--shadow)}
.stat-card::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(244,180,0,.05),transparent);pointer-events:none}
.stat-label{font-size:12px;color:var(--text-dim);font-weight:500;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.stat-value{font-size:32px;font-weight:800;line-height:1;margin:4px 0}
.stat-change{font-size:11px;font-weight:600;color:var(--green)}
.stat-change.down{color:var(--red)}.stat-change.neutral{color:var(--text-dim)}
.stat-icon{position:absolute;top:16px;right:16px;width:36px;height:36px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-size:18px}
.stat-icon.honey{background:rgba(244,180,0,.12);color:var(--honey)}.stat-icon.info{background:rgba(59,130,246,.12);color:var(--blue)}
.stat-icon.success{background:rgba(34,197,94,.12);color:var(--green)}.stat-icon.danger{background:rgba(239,68,68,.12);color:var(--red)}
.stat-icon.warning{background:rgba(245,158,11,.12);color:var(--honey2)}
.content-grid{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:24px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px}
.card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.card-title{font-size:15px;font-weight:700}
.card-link{font-size:12px;color:var(--honey);text-decoration:none;cursor:pointer}
.chart-wrap{height:220px;position:relative;display:flex;align-items:flex-end;gap:10px;padding:0 8px 30px;border-bottom:1px solid var(--border);position:relative}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;min-width:0}
.bar{width:100%;max-width:32px;border-radius:6px 6px 0 0;background:linear-gradient(180deg,var(--honey),var(--honey2));transition:.3s;min-height:4px}
.bar:hover{filter:brightness(1.2)}
.bar-label{font-size:10px;color:var(--text-dim);white-space:nowrap}
.bar-val{font-size:11px;font-weight:600;color:var(--text)}
.list-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.list-item:last-child{border-bottom:none}
.list-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-green{background:var(--green)}.dot-yellow{background:var(--honey)}.dot-red{background:var(--red)}
.list-main{flex:1;min-width:0}
.list-name{font-size:13px;font-weight:600}.list-info{font-size:11px;color:var(--text-dim)}
.badge{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:600;display:inline-block}
.badge.ok{background:rgba(34,197,94,.15);color:var(--green)}.badge.warn{background:rgba(245,158,11,.15);color:var(--honey2)}
.badge.danger{background:rgba(239,68,68,.15);color:var(--red)}.badge.info{background:rgba(59,130,246,.15);color:var(--blue)}
.weather-card{background:linear-gradient(135deg,rgba(244,180,0,.08),rgba(245,158,11,.04));border:1px solid rgba(244,180,0,.2)}
.weather-now{display:flex;align-items:center;gap:16px;margin-bottom:16px}
.weather-icon{font-size:48px}.weather-temp{font-size:36px;font-weight:800}
.weather-info{font-size:13px;color:var(--text-dim)}
.flora-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.flora-tag{font-size:11px;padding:4px 10px;border-radius:99px;background:var(--surface2);color:var(--text-dim)}
.actions-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px}
.action-btn{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 12px;cursor:pointer;text-align:center;transition:.2s;font-family:inherit}
.action-btn:hover{border-color:var(--honey);background:var(--surface2);transform:translateY(-2px)}
.action-ico{font-size:22px;margin-bottom:6px;display:flex;justify-content:center}
.action-label{font-size:12px;font-weight:600}
.view{display:none}.view.active{display:block}
.toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--honey);padding:12px 16px;border-radius:var(--r-sm);box-shadow:var(--shadow);max-width:320px;font-size:13px;animation:slideIn .3s}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.bottom-nav{display:none}
@media(max-width:1024px){.app{grid-template-columns:1fr;grid-template-areas:"header" "main"}.sidebar{display:none}.bottom-nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);z-index:100;padding:8px;justify-content:space-around}.bottom-nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 10px;border:none;background:transparent;color:var(--text-dim);font-size:10px;cursor:pointer;font-family:inherit}.bottom-nav-item.active{color:var(--honey)}.bottom-nav-item .ico{font-size:18px}.main{padding-bottom:80px}.stats-grid{grid-template-columns:repeat(2,1fr)}.content-grid{grid-template-columns:1fr}.actions-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:640px){.stat-value{font-size:26px}.header{padding:0 16px}.main{padding:16px}}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:1000;align-items:center;justify-content:center;padding:20px}
.modal-overlay.active{display:flex;animation:fadeIn .2s}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow)}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:18px 24px;border-bottom:1px solid var(--border)}
.modal-head h3{margin:0;font-size:16px;font-weight:700}
.modal-close{background:transparent;border:none;color:var(--text-dim);font-size:28px;cursor:pointer;padding:0 8px;line-height:1;font-family:inherit}
.modal-close:hover{color:var(--text)}
.modal-body{padding:24px;display:flex;flex-direction:column;gap:14px}
.modal-foot{display:flex;justify-content:flex-end;gap:8px;padding:16px 24px;border-top:1px solid var(--border);background:var(--surface2)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* Form fields */
.field{display:flex;flex-direction:column;gap:6px}
.field>span{font-size:12px;color:var(--text-dim);font-weight:600}
.field input,.field select,.field textarea{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:var(--r-sm);font-size:14px;font-family:inherit;transition:.15s;width:100%;box-sizing:border-box}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--honey);box-shadow:0 0 0 3px rgba(244,180,0,.15)}
.field textarea{resize:vertical;min-height:60px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* List item with action buttons */
.list-item-row{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--border)}
.list-item-row:last-child{border-bottom:none}
.list-item-row .list-main{flex:1;min-width:0}
.actions-mini{display:flex;gap:6px;flex-shrink:0}
.btn-mini{background:var(--surface2);color:var(--text);border:1px solid var(--border);padding:6px 12px;border-radius:var(--r-sm);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s}
.btn-mini:hover{background:var(--border);border-color:var(--honey)}
.btn-mini.danger{color:var(--red)}
.btn-mini.danger:hover{background:rgba(239,68,68,.15);border-color:var(--red)}

/* Empty state */
.empty{padding:32px 16px;text-align:center;color:var(--text-dim);font-size:14px}
.empty .card-link{display:inline-block;margin-top:8px;color:var(--honey);font-weight:600;cursor:pointer}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="logo"><span class="bee">🐝</span><span class="brand">BeeMaster AI</span></div>
    <nav id="nav-list">
      <button class="nav-item active" data-view="dashboard" onclick="App.nav('dashboard')"><span class="ico">📊</span>Dashboard</button>
      <button class="nav-item" data-view="apiaries" onclick="App.nav('apiaries')"><span class="ico">📍</span>Arı Üsleri</button>
      <button class="nav-item" data-view="hives" onclick="App.nav('hives')"><span class="ico">🏠</span>Kovanlar</button>
      <button class="nav-item" data-view="inspections" onclick="App.nav('inspections')"><span class="ico">📋</span>Muayeneler</button>
      <button class="nav-item" data-view="queens" onclick="App.nav('queens')"><span class="ico">👑</span>Ana Arılar</button>
      <button class="nav-item" data-view="honey" onclick="App.nav('honey')"><span class="ico">🍯</span>Bal Hasadı</button>
      <button class="nav-item" data-view="feeding" onclick="App.nav('feeding')"><span class="ico">🌾</span>Besleme</button>
      <button class="nav-item" data-view="treatments" onclick="App.nav('treatments')"><span class="ico">💊</span>Tedaviler</button>
      <button class="nav-item" data-view="inventory" onclick="App.nav('inventory')"><span class="ico">📦</span>Envanter</button>
      <button class="nav-item" data-view="analytics" onclick="App.nav('analytics')"><span class="ico">📈</span>Analitik</button>
      <button class="nav-item" data-view="reports" onclick="App.nav('reports')"><span class="ico">📄</span>Raporlar</button>
      <button class="nav-item" data-view="settings" onclick="App.nav('settings')"><span class="ico">⚙️</span>Ayarlar</button>
    </nav>
    <div class="sidebar-foot">
      <div class="user-card">
        <div class="avatar">İÖ</div>
        <div><div class="user-name">İlker Öcal</div><div class="user-role">Arıcı · Diyarbakır</div></div>
      </div>
    </div>
  </aside>

  <header class="header">
    <div class="page-title">
      <h1 id="page-title">Dashboard</h1>
      <p id="page-subtitle">Genel bakış · Eğil, Diyarbakır</p>
    </div>
    <div class="header-actions">
      <button class="btn-ghost btn" onclick="App.toast('Arama yakında')">🔍</button>
      <button class="btn-ghost btn" onclick="App.toggleTheme()" id="theme-toggle">🌙</button>
      <button class="btn-ghost btn" onclick="App.toast('Bildirim yok')">🔔</button>
    </div>
  </header>

  <main class="main" id="main-content">
    <div id="view-dashboard" class="view active"></div>
    <div id="view-apiaries" class="view"></div>
    <div id="view-hives" class="view"></div>
    <div id="view-inspections" class="view"></div>
    <div id="view-queens" class="view"></div>
    <div id="view-honey" class="view"></div>
    <div id="view-feeding" class="view"></div>
    <div id="view-treatments" class="view"></div>
    <div id="view-inventory" class="view"></div>
    <div id="view-analytics" class="view"></div>
    <div id="view-reports" class="view"></div>
    <div id="view-settings" class="view"></div>
  </main>
</div>

<nav class="bottom-nav" id="bottom-nav">
  <button class="bottom-nav-item active" data-view="dashboard" onclick="App.nav('dashboard')"><span class="ico">📊</span>Dashboard</button>
  <button class="bottom-nav-item" data-view="hives" onclick="App.nav('hives')"><span class="ico">🏠</span>Kovan</button>
  <button class="bottom-nav-item" data-view="inspections" onclick="App.nav('inspections')"><span class="ico">📋</span>Muayene</button>
  <button class="bottom-nav-item" data-view="honey" onclick="App.nav('honey')"><span class="ico">🍯</span>Bal</button>
  <button class="bottom-nav-item" data-view="analytics" onclick="App.nav('analytics')"><span class="ico">📈</span>Analitik</button>
</nav>

<div class="toast-container" id="toast-container"></div>

<script>
// ============================================================
// Data — localStorage ile kalici veri
// ============================================================
var Data = {
  load: function() {
    try {
      var saved = localStorage.getItem('beemaster-data');
      if (saved) {
        var d = JSON.parse(saved);
        this.apiaries = d.apiaries || [];
        this.hives = d.hives || [];
        this.inspections = d.inspections || [];
        this.queens = d.queens || [];
        this.harvests = d.harvests || [];
        return true;
      }
    } catch(e) { console.warn('Data load failed', e); }
    return false;
  },
  save: function() {
    try {
      localStorage.setItem('beemaster-data', JSON.stringify({
        apiaries: this.apiaries, hives: this.hives, inspections: this.inspections,
        queens: this.queens, harvests: this.harvests
      }));
    } catch(e) { console.warn('Data save failed', e); }
  },
  seed: function() {
    this.apiaries = [
      {id:1, name:'Eğil Merkez', location:'Eğil, Diyarbakır', flora:'Geven, Kekik, Adaçayı', note:''},
      {id:2, name:'Surlar Üssü', location:'Sur, Diyarbakır', flora:'Pamuk, Ayçiçeği', note:''}
    ];
    this.hives = [
      {id:1, apiaryId:1, name:'Kovan #1', queen:'Ana Arı #1 (Karniyol)', frames:10, population:'Güçlü', honey:12.5, varroa:1, status:'good', lastInspection:'3 gün önce', note:''},
      {id:2, apiaryId:1, name:'Kovan #2', queen:'Ana Arı #2 (Kafkas)', frames:8, population:'Orta', honey:8.2, varroa:4, status:'warning', lastInspection:'5 gün önce', note:''},
      {id:3, apiaryId:1, name:'Kovan #3', queen:'Ana Arı #3 (Anadolu)', frames:10, population:'Güçlü', honey:15.0, varroa:2, status:'good', lastInspection:'2 gün önce', note:''},
      {id:4, apiaryId:1, name:'Kovan #4', queen:'Ana Arı #4 (Karniyol)', frames:9, population:'Güçlü', honey:11.8, varroa:2, status:'good', lastInspection:'1 gün önce', note:''},
      {id:5, apiaryId:2, name:'Kovan #5', queen:'Ana Arı #5 (Kafkas)', frames:7, population:'Zayıf', honey:3.5, varroa:8, status:'danger', lastInspection:'7 gün önce', note:''},
      {id:6, apiaryId:2, name:'Kovan #6', queen:'Ana Arı #6 (Anadolu)', frames:10, population:'Güçlü', honey:9.7, varroa:2, status:'good', lastInspection:'4 gün önce', note:''},
      {id:7, apiaryId:2, name:'Kovan #7', queen:'Ana Arı #7 (Karpat)', frames:8, population:'Orta', honey:6.4, varroa:3, status:'warning', lastInspection:'6 gün önce', note:''}
    ];
    this.inspections = [
      {id:1, hiveId:1, date:'18 Tem 2026', varroa:1, population:'Güçlü', eggs:'Düzenli', brood:8, note:'Genel durum iyi', status:'ok'},
      {id:2, hiveId:3, date:'17 Tem 2026', varroa:2, population:'Güçlü', eggs:'Düzenli', brood:7, note:'Yumurta düzenli', status:'ok'},
      {id:3, hiveId:5, date:'16 Tem 2026', varroa:8, population:'Zayıf', eggs:'Düzensiz', brood:4, note:'Varroa yüksek - tedavi gerekli', status:'danger'},
      {id:4, hiveId:2, date:'15 Tem 2026', varroa:4, population:'Orta', eggs:'Düzenli', brood:6, note:'Ana arı değişti', status:'warn'},
      {id:5, hiveId:7, date:'14 Tem 2026', varroa:3, population:'Orta', eggs:'Düzenli', brood:5, note:'Çerçeveler azaldı', status:'warn'}
    ];
    this.queens = [
      {id:1, breed:'Karniyol', age:2, productivity:'Yüksek', status:'active', marked:true},
      {id:2, breed:'Kafkas', age:3, productivity:'Orta', status:'active', marked:true},
      {id:3, breed:'Anadolu', age:1, productivity:'Yüksek', status:'active', marked:false},
      {id:4, breed:'Karniyol', age:2, productivity:'Yüksek', status:'active', marked:true},
      {id:5, breed:'Kafkas', age:4, productivity:'Düşük', status:'replace', marked:true}
    ];
    this.harvests = [
      {month:'Mayıs', weight:4.5}, {month:'Haziran', weight:8.2},
      {month:'Temmuz', weight:12.8}, {month:'Ağustos', weight:9.1},
      {month:'Eylül', weight:1.6}, {month:'Ekim', weight:0}
    ];
    this.save();
  },
  nextId: function(arr) {
    if (!arr.length) return 1;
    return Math.max.apply(null, arr.map(function(i){return i.id||0})) + 1;
  }
};

// Veri yoksa seed
if (!Data.load()) Data.seed();

// ============================================================
// Modal — form bazlı ekleme/düzenleme
// ============================================================
var Modal = {
  open: function(title, html, onSave) {
    var m = document.getElementById('modal');
    if (!m) {
      m = document.createElement('div');
      m.id = 'modal';
      m.className = 'modal-overlay';
      m.innerHTML = '<div class="modal"><div class="modal-head"><h3 id="modal-title"></h3><button class="modal-close" onclick="Modal.close()">×</button></div><form id="modal-form"><div class="modal-body" id="modal-body"></div><div class="modal-foot"><button type="button" class="btn btn-ghost" onclick="Modal.close()">İptal</button><button type="submit" class="btn btn-primary">Kaydet</button></div></form></div>';
      document.body.appendChild(m);
    }
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-body').innerHTML = html;
    m.classList.add('active');
    var form = document.getElementById('modal-form');
    form.onsubmit = function(e) {
      e.preventDefault();
      var fd = new FormData(form);
      var data = {};
      fd.forEach(function(v,k){ data[k]=v; });
      if (onSave(data)) Modal.close();
    };
    setTimeout(function(){var first = m.querySelector('input,textarea,select'); if(first) first.focus();}, 50);
  },
  close: function() {
    var m = document.getElementById('modal');
    if (m) m.classList.remove('active');
  },
  confirm: function(msg, onYes) {
    Modal.open('Onay', '<p style="padding:8px 0;color:var(--text-dim)">'+msg+'</p>', function(){onYes(); return true;});
  }
};

// ============================================================
// Yardimcılar
// ============================================================
function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/[&<>"']/g, function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});
}
function statusBadge(s) {
  var map = {good:'OK', warning:'DİKKAT', danger:'ACİL', ok:'İYİ', warn:'DİKKAT', active:'AKTİF', replace:'DEĞİŞTİR'};
  var cls = s==='good'||s==='ok'?'ok':(s==='danger'?'danger':'warn');
  return '<span class="badge '+cls+'">'+(map[s]||s)+'</span>';
}
function dotColor(s) {
  return s==='good'||s==='ok'?'dot-green':(s==='danger'?'dot-red':'dot-yellow');
}

function openAddHive() {
  var apiaryOpts = Data.apiaries.map(function(a){return '<option value="'+a.id+'">'+escapeHtml(a.name)+'</option>';}).join('');
  Modal.open('Yeni Kovan Ekle',
    '<label class="field"><span>Kovan Adı *</span><input name="name" required placeholder="Örn: Kovan #8"></label>'+
    '<label class="field"><span>Ana Arı Irkı *</span><input name="queen" required placeholder="Örn: Karniyol"></label>'+
    '<label class="field"><span>Arı Üssü *</span><select name="apiaryId" required>'+apiaryOpts+'</select></label>'+
    '<div class="field-row"><label class="field"><span>Çerçeve</span><input name="frames" type="number" min="0" value="10"></label>'+
    '<label class="field"><span>Popülasyon</span><select name="population"><option>Güçlü</option><option>Orta</option><option>Zayıf</option></select></label></div>'+
    '<label class="field"><span>Bal (kg)</span><input name="honey" type="number" step="0.1" value="0"></label>'+
    '<label class="field"><span>Notlar</span><textarea name="note" rows="2" placeholder="Ek bilgi..."></textarea></label>',
    function(d){
      d.id = Data.nextId(Data.hives);
      d.frames = parseInt(d.frames)||0;
      d.honey = parseFloat(d.honey)||0;
      d.varroa = 0;
      d.status = 'good';
      d.lastInspection = 'Henüz yok';
      Data.hives.push(d);
      Data.save();
      App.toast('Kovan eklendi ✓');
      App.render('hives');
      return true;
    }
  );
}
function openEditHive(id) {
  var h = Data.hives.find(function(x){return x.id===id;});
  if (!h) return;
  var apiaryOpts = Data.apiaries.map(function(a){return '<option value="'+a.id+'"'+(a.id===h.apiaryId?' selected':'')+'>'+escapeHtml(a.name)+'</option>';}).join('');
  Modal.open('Kovan Düzenle — '+escapeHtml(h.name),
    '<label class="field"><span>Kovan Adı *</span><input name="name" required value="'+escapeHtml(h.name)+'"></label>'+
    '<label class="field"><span>Ana Arı Irkı *</span><input name="queen" required value="'+escapeHtml(h.queen)+'"></label>'+
    '<label class="field"><span>Arı Üssü *</span><select name="apiaryId" required>'+apiaryOpts+'</select></label>'+
    '<div class="field-row"><label class="field"><span>Çerçeve</span><input name="frames" type="number" min="0" value="'+h.frames+'"></label>'+
    '<label class="field"><span>Popülasyon</span><select name="population"><option'+(h.population==='Güçlü'?' selected':'')+'>Güçlü</option><option'+(h.population==='Orta'?' selected':'')+'>Orta</option><option'+(h.population==='Zayıf'?' selected':'')+'>Zayıf</option></select></label></div>'+
    '<label class="field"><span>Bal (kg)</span><input name="honey" type="number" step="0.1" value="'+h.honey+'"></label>'+
    '<label class="field"><span>Notlar</span><textarea name="note" rows="2">'+escapeHtml(h.note||'')+'</textarea></label>',
    function(d){
      d.frames = parseInt(d.frames)||0;
      d.honey = parseFloat(d.honey)||0;
      Object.assign(h, d);
      Data.save();
      App.toast('Kovan güncellendi ✓');
      App.render('hives');
      return true;
    }
  );
}
function deleteHive(id) {
  var h = Data.hives.find(function(x){return x.id===id;});
  if (!h) return;
  Modal.confirm('"'+h.name+'" kovanını silmek istiyor musunuz? Bu işlem geri alınamaz.', function(){
    Data.hives = Data.hives.filter(function(x){return x.id!==id;});
    Data.inspections = Data.inspections.filter(function(x){return x.hiveId!==id;});
    Data.save();
    App.toast('Kovan silindi');
    App.render('hives');
  });
}

function openAddInspection() {
  if (!Data.hives.length) { App.toast('Önce kovan ekleyin'); return; }
  var hiveOpts = Data.hives.map(function(h){return '<option value="'+h.id+'">'+escapeHtml(h.name)+' — '+escapeHtml(h.queen)+'</option>';}).join('');
  Modal.open('Yeni Muayene Ekle',
    '<label class="field"><span>Kovan *</span><select name="hiveId" required>'+hiveOpts+'</select></label>'+
    '<label class="field"><span>Tarih *</span><input name="date" type="date" required value="'+new Date().toISOString().split('T')[0]+'"></label>'+
    '<div class="field-row"><label class="field"><span>Varroa (adet)</span><input name="varroa" type="number" min="0" value="0"></label>'+
    '<label class="field"><span>Yavru Çerçeve</span><input name="brood" type="number" min="0" value="6"></label></div>'+
    '<label class="field"><span>Popülasyon</span><select name="population"><option>Güçlü</option><option selected>Orta</option><option>Zayıf</option></select></label>'+
    '<label class="field"><span>Yumurta Düzeni</span><select name="eggs"><option>Düzenli</option><option>Düzensiz</option><option>Yok</option></select></label>'+
    '<label class="field"><span>Notlar</span><textarea name="note" rows="3" placeholder="Muayene notları..."></textarea></label>',
    function(d){
      d.id = Data.nextId(Data.inspections);
      d.varroa = parseInt(d.varroa)||0;
      d.brood = parseInt(d.brood)||0;
      d.status = d.varroa>=6?'danger':(d.varroa>=3?'warn':'ok');
      Data.inspections.push(d);
      // Kovan'in son muayenesini güncelle
      var h = Data.hives.find(function(x){return x.id==d.hiveId;});
      if (h) {
        h.varroa = d.varroa;
        h.lastInspection = d.date;
        h.status = d.status==='danger'?'danger':(d.status==='warn'?'warning':'good');
      }
      Data.save();
      App.toast('Muayene eklendi ✓');
      App.render('inspections');
      return true;
    }
  );
}

var App = {
  nav: function(view) {
    document.querySelectorAll('.view').forEach(function(v){v.classList.remove('active')});
    document.querySelectorAll('.nav-item, .bottom-nav-item').forEach(function(n){
      n.classList.toggle('active', n.getAttribute('data-view') === view);
    });
    var el = document.getElementById('view-' + view);
    if (el) el.classList.add('active');
    var titles = {
      dashboard:['Dashboard','Genel bakış · Eğil, Diyarbakır'],
      apiaries:['Arı Üsleri',Data.apiaries.length+' üs'],
      hives:['Kovanlar',Data.hives.length+' kovan'],
      inspections:['Muayeneler',Data.inspections.length+' kayıt'],
      queens:['Ana Arılar',Data.queens.length+' ana arı'],
      honey:['Bal Hasadı',Data.harvests.reduce(function(s,h){return s+h.weight},0).toFixed(1)+' kg toplam']
    };
    var t = titles[view] || [view,''];
    document.getElementById('page-title').textContent = t[0];
    document.getElementById('page-subtitle').textContent = t[1];
    this.render(view);
    if (history.pushState) history.pushState(null, '', '#'+view);
  },

  render: function(view) {
    view = view || 'dashboard';
    var fn = this['render_' + view];
    if (fn) fn.call(this);
  },

  render_dashboard: function() {
    var d = Data;
    var totalHives = d.hives.length;
    var activeApiaries = d.apiaries.length;
    var totalHoney = d.harvests.reduce(function(s,h){return s+h.weight},0);
    var avgVarroa = d.inspections.length ? (d.inspections.reduce(function(s,i){return s+i.varroa},0)/d.inspections.length).toFixed(1) : 0;
    var maxHoney = Math.max.apply(null, d.harvests.map(function(h){return h.weight}).concat([1]));

    var stats = [
      {label:'Toplam Kovan',value:totalHives,change:'Canlı',dir:'up',icon:'🏠',type:'honey'},
      {label:'Aktif Üs',value:activeApiaries,change:'Tümü',dir:'neutral',icon:'📍',type:'info'},
      {label:'Toplam Bal',value:totalHoney.toFixed(1)+' kg',change:'Hasat',dir:'up',icon:'🍯',type:'success'},
      {label:'Ort. Varroa',value:avgVarroa,change:'Son muayeneler',dir:parseFloat(avgVarroa)>3?'down':'up',icon:'⚠️',type:parseFloat(avgVarroa)>3?'danger':'warning'}
    ];

    var html = '<div class="stats-grid">';
    stats.forEach(function(s){
      html += '<div class="stat-card"><div class="stat-icon '+s.type+'">'+s.icon+'</div><div class="stat-label">'+s.label+'</div><div class="stat-value">'+s.value+'</div><div class="stat-change '+s.dir+'">'+s.change+'</div></div>';
    });
    html += '</div>';

    html += '<div class="actions-grid">';
    var actions = [
      ['📋','Yeni Muayene','openAddInspection()'],
      ['🍯','Hasat',"App.toast('Hasat modülü yakında')"],
      ['🌾','Besleme',"App.toast('Besleme modülü yakında')"],
      ['💊','Tedavi',"App.toast('Tedavi modülü yakında')"],
      ['➕','Yeni Kovan','openAddHive()']
    ];
    actions.forEach(function(a){
      html += '<button class="action-btn" onclick="'+a[2]+'"><div class="action-ico">'+a[0]+'</div><div class="action-label">'+a[1]+'</div></button>';
    });
    html += '</div>';

    html += '<div class="content-grid"><div><div class="card"><div class="card-head"><div class="card-title">📈 Hasat Performansı</div></div><div class="chart-wrap">';
    d.harvests.forEach(function(h){
      var height = Math.round((h.weight/maxHoney)*100);
      html += '<div class="bar-col"><div class="bar-val">'+h.weight+' kg</div><div class="bar" style="height:'+height+'%"></div><div class="bar-label">'+h.month+'</div></div>';
    });
    html += '</div></div>';

    html += '<div class="card" style="margin-top:16px"><div class="card-head"><div class="card-title">📋 Son Muayeneler</div><a class="card-link" onclick="App.nav(\'inspections\')">Tümü →</a></div>';
    var recent = d.inspections.slice().sort(function(a,b){return (b.id||0)-(a.id||0)}).slice(0,5);
    if (!recent.length) {
      html += '<div class="empty">Henüz muayene yok. <a class="card-link" onclick="openAddInspection()">İlk muayeneyi ekle →</a></div>';
    }
    recent.forEach(function(i){
      var hive = d.hives.find(function(h){return h.id===i.hiveId;});
      var hname = hive?hive.name:'Kovan #'+i.hiveId;
      html += '<div class="list-item"><div class="list-dot '+dotColor(i.status)+'"></div><div class="list-main"><div class="list-name">'+escapeHtml(hname)+' · '+i.date+'</div><div class="list-info">'+escapeHtml(i.note||'-')+'</div></div>'+statusBadge(i.status)+'</div>';
    });
    html += '</div></div>';

    html += '<div><div class="card weather-card"><div class="card-head"><div class="card-title">🌤️ Hava & Flora</div></div><div class="weather-now"><div class="weather-icon">☀️</div><div><div class="weather-temp">28°C</div><div class="weather-info">Güneşli · Nem %35 · Rüzgar 12 km</div></div></div><div class="cl">Aktif flora:</div><div class="flora-tags"><span class="flora-tag">Geven</span><span class="flora-tag">Kekik</span><span class="flora-tag">Adaçayı</span><span class="flora-tag">Pamuk</span><span class="flora-tag">Ayçiçeği</span></div></div>';

    html += '<div class="card" style="margin-top:16px"><div class="card-head"><div class="card-title">⚠️ Uyarılar</div></div>';
    var dangers = d.hives.filter(function(h){return h.status==='danger'||h.varroa>=6;});
    var warns = d.hives.filter(function(h){return h.status==='warning'||(h.varroa>=3&&h.varroa<6);});
    if (!dangers.length && !warns.length) {
      html += '<div class="empty">Aktif uyarı yok 🎉</div>';
    } else {
      dangers.forEach(function(h){
        html += '<div class="list-item"><div class="list-dot dot-red"></div><div class="list-main"><div class="list-name">'+escapeHtml(h.name)+'</div><div class="list-info">Varroa '+h.varroa+' — acil tedavi</div></div><span class="badge danger">ACİL</span></div>';
      });
      warns.slice(0,3).forEach(function(h){
        html += '<div class="list-item"><div class="list-dot dot-yellow"></div><div class="list-main"><div class="list-name">'+escapeHtml(h.name)+'</div><div class="list-info">Varroa '+h.varroa+' — izle</div></div><span class="badge warn">DİKKAT</span></div>';
      });
    }
    html += '</div></div></div>';

    document.getElementById('view-dashboard').innerHTML = html;
  },

  },

  render_honey: function() {
    var total = Data.harvests.reduce(function(s,h){return s+h.weight},0);
    var html = '<div class="stats-grid"><div class="stat-card"><div class="stat-icon success">🍯</div><div class="stat-label">Toplam Hasat</div><div class="stat-value">'+total.toFixed(1)+' kg</div></div></div>';
    html += '<div class="card"><div class="card-head"><div class="card-title">Hasat Geçmişi</div></div><div class="chart-wrap">';
    var max = Math.max.apply(null, Data.harvests.map(function(h){return h.weight}).concat([1]));
    Data.harvests.forEach(function(h){
      var height = Math.round((h.weight/max)*100);
      html += '<div class="bar-col"><div class="bar-val">'+h.weight+' kg</div><div class="bar" style="height:'+height+'%"></div><div class="bar-label">'+h.month+'</div></div>';
    });
    html += '</div></div>';
    document.getElementById('view-honey').innerHTML = html;
  },

  toast: function(msg) {
    var container = document.getElementById('toast-container');
    var el = document.createElement('div');
    el.className = 'toast';
    el.textContent = msg;
    container.appendChild(el);
    setTimeout(function(){el.style.opacity='0';setTimeout(function(){el.remove()},300)},2500);
  },

  toggleTheme: function() {
    var html = document.documentElement;
    var cur = html.getAttribute('data-theme') || 'dark';
    var next = cur==='dark'?'light':'dark';
    html.setAttribute('data-theme', next);
    document.getElementById('theme-toggle').textContent = next==='dark'?'🌙':'☀️';
    try{localStorage.setItem('bm-theme',next)}catch(e){}
  }
};

// ESC ile modal kapat
document.addEventListener('keydown', function(e){ if (e.key==='Escape') Modal.close(); });

// Unregister SW
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(function(regs){regs.forEach(function(r){r.unregister();});});
}

// Apply saved theme
try { var saved = localStorage.getItem('bm-theme'); if (saved) { document.documentElement.setAttribute('data-theme', saved); } } catch(e){}

// Init
function init() {
  var view = (location.hash || '#dashboard').slice(1);
  App.nav(view);
  console.log('[BeeMaster AI] Ready. View:', view);
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script></script>
