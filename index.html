<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=5"/>
  <meta name="theme-color" content="#14141C"/>
  <meta name="color-scheme" content="dark light"/>
  <meta name="description" content="BeeMaster AI — Kanıta dayalı arıcılık karar destek sistemi. Arıcılık bilgi tabanı, kovan yönetimi, muayene kaydı, hastalık teşhisi."/>
  <meta name="keywords" content="arıcılık, kovan, muayene, varroa, bal, ana arı, danışman, BeeMaster"/>
  <meta property="og:title" content="BeeMaster AI — Arıcılık Yönetim Paneli"/>
  <meta property="og:description" content="Profesyonel arıcılık karar destek sistemi"/>

  <title>BeeMaster AI — Arıcılık Yönetim Paneli</title>

  <link rel="manifest" href="manifest.json"/>
  <link rel="icon" type="image/svg+xml" href="icons/favicon.svg"/>
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png"/>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap"/>

  <!-- Lucide icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="css/tokens.css"/>
  <link rel="stylesheet" href="css/components.css"/>
  <link rel="stylesheet" href="css/layout.css"/>
  <link rel="stylesheet" href="css/routes.css"/>
</head>
<body>
  <a class="sr-only" href="#main">İçeriğe geç</a>

  <!-- ============== App Shell ============== -->
  <div class="app-shell">

    <!-- ============== Sidebar (Desktop) ============== -->
    <aside class="sidebar" id="sidebar" aria-label="Yan menü">
      <div class="sidebar-header">
        <div class="brand">
          <div class="brand-mark">
            <i data-lucide="hexagon" aria-hidden="true"></i>
          </div>
          <span>BeeMaster</span>
        </div>
      </div>

      <nav class="sidebar-nav" aria-label="Birincil gezinme">
        <div class="nav-section">
          <div class="nav-section-label">Genel</div>
          <a href="#/dashboard" class="nav-link" data-route="dashboard">
            <i data-lucide="layout-dashboard"></i>
            <span class="nav-link-label">Pano</span>
          </a>
          <a href="#/advisor" class="nav-link" data-route="advisor">
            <i data-lucide="sparkles"></i>
            <span class="nav-link-label">Danışman</span>
          </a>
          <a href="#/reminders" class="nav-link" data-route="reminders">
            <i data-lucide="bell"></i>
            <span class="nav-link-label">Hatırlatıcılar</span>
            <span class="nav-badge" id="reminders-badge" style="display:none">0</span>
          </a>
        </div>

        <div class="nav-section">
          <div class="nav-section-label">Kovanlar</div>
          <a href="#/hives" class="nav-link" data-route="hives">
            <i data-lucide="hexagon"></i>
            <span class="nav-link-label">Kovanlarım</span>
            <span class="nav-badge" id="hives-badge">0</span>
          </a>
          <a href="#/inspections" class="nav-link" data-route="inspections">
            <i data-lucide="clipboard-list"></i>
            <span class="nav-link-label">Muayeneler</span>
          </a>
          <a href="#/treatments" class="nav-link" data-route="treatments">
            <i data-lucide="pill"></i>
            <span class="nav-link-label">Tedaviler</span>
          </a>
          <a href="#/harvests" class="nav-link" data-route="harvests">
            <i data-lucide="drumstick"></i>
            <span class="nav-link-label">Hasat</span>
          </a>
        </div>

        <div class="nav-section">
          <div class="nav-section-label">Bilgi</div>
          <a href="#/knowledge" class="nav-link" data-route="knowledge">
            <i data-lucide="book-open"></i>
            <span class="nav-link-label">Bilgi Tabanı</span>
          </a>
          <a href="#/reports" class="nav-link" data-route="reports">
            <i data-lucide="file-text"></i>
            <span class="nav-link-label">Raporlar</span>
          </a>
        </div>
      </nav>

      <div class="sidebar-footer">
        <button class="btn btn-secondary" style="width:100%" id="btn-settings-desktop">
          <i data-lucide="settings"></i>
          Ayarlar
        </button>
      </div>
    </aside>

    <!-- ============== Main Column ============== -->
    <div style="flex:1; min-width:0; display:flex; flex-direction:column;">

      <!-- ============== Topbar ============== -->
      <header class="topbar">
        <div class="topbar-left">
          <button class="icon-btn" id="theme-toggle" aria-label="Tema değiştir">
            <i data-lucide="moon" id="theme-icon"></i>
          </button>
          <div class="search-wrap">
            <i data-lucide="search" class="search-icon"></i>
            <input type="search" id="search-input" class="search-input" placeholder="Ara..." aria-label="Arama"/>
          </div>
          <span class="page-title" id="page-title">Pano</span>
        </div>
        <div class="topbar-right">
          <button class="icon-btn" id="btn-region-mobile" aria-label="Bölge değiştir" title="Bölge">
            <i data-lucide="map-pin"></i>
          </button>
          <button class="icon-btn" id="btn-export" aria-label="Dışa aktar" title="Dışa aktar">
            <i data-lucide="download"></i>
          </button>
          <button class="icon-btn" id="btn-import" aria-label="İçe aktar" title="İçe aktar">
            <i data-lucide="upload"></i>
          </button>
          <button class="icon-btn" id="btn-settings" aria-label="Ayarlar" title="Ayarlar">
            <i data-lucide="settings"></i>
          </button>
        </div>
      </header>

      <!-- ============== Main Content ============== -->
      <main id="main" class="main" tabindex="-1">
        <div class="page-content" id="route-outlet" aria-live="polite">
          <!-- Skeleton loader on first load -->
          <div class="skeleton skeleton-card" style="height:120px; margin-bottom: 16px;"></div>
          <div class="stat-grid">
            <div class="skeleton skeleton-card"></div>
            <div class="skeleton skeleton-card"></div>
            <div class="skeleton skeleton-card"></div>
            <div class="skeleton skeleton-card"></div>
          </div>
        </div>
      </main>

    </div>

    <!-- ============== Bottom Navigation (Mobile) ============== -->
    <nav class="bottom-nav" aria-label="Alt gezinme">
      <a href="#/dashboard" class="bottom-nav-link" data-route="dashboard">
        <i data-lucide="layout-dashboard"></i>
        <span>Pano</span>
      </a>
      <a href="#/hives" class="bottom-nav-link" data-route="hives">
        <i data-lucide="hexagon"></i>
        <span>Kovanlar</span>
        <span class="bottom-nav-badge" id="hives-badge-mobile" style="display:none">0</span>
      </a>
      <a href="#/advisor" class="bottom-nav-link" data-route="advisor">
        <i data-lucide="sparkles"></i>
        <span>Danışman</span>
      </a>
      <a href="#/reminders" class="bottom-nav-link" data-route="reminders">
        <i data-lucide="bell"></i>
        <span>Hatırlat.</span>
        <span class="bottom-nav-badge" id="reminders-badge-mobile" style="display:none">0</span>
      </a>
      <a href="#/reports" class="bottom-nav-link" data-route="reports">
        <i data-lucide="file-text"></i>
        <span>Raporlar</span>
      </a>
    </nav>
  </div>

  <!-- ============== Toast Container ============== -->
  <div class="toast-stack" id="toast-root" aria-live="polite"></div>

  <!-- ============== Modal Container ============== -->
  <div id="modal-root"></div>

  <!-- ============== Scripts ============== -->
  <script src="js/region.js"></script>
  <script src="js/db.js"></script>
  <script src="js/risk-engine.js"></script>
  <script src="js/decision-engine.js"></script>
  <script src="js/knowledge-bundle.js"></script>
  <script src="js/reminders.js"></script>
  <script src="js/learning.js"></script>
  <script src="js/forum-search.js"></script>
  <script src="js/media.js"></script>
  <script src="js/views.js"></script>
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>

  <!-- Service worker -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
