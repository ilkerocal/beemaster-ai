<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#07080C">
  <meta name="description" content="BeeMaster AI - Yapay zeka destekli arıcılık yönetim platformu">
  <title>🐝 BeeMaster AI - Arıcılık Yönetimi</title>

  <!-- Cache bypass -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json?v=5">
  <link rel="icon" type="image/svg+xml" href="icons/favicon.svg?v=5">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png?v=5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BeeMaster AI">
  <meta name="application-name" content="BeeMaster AI">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/app.css?v=5">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="anonymous">

  <!-- Boot screen (CSS inline, instantly visible) -->
  <style>
    .boot-screen {
      position: fixed; inset: 0; z-index: 99999;
      background: #07080C; color: #E8EAF2;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      transition: opacity 0.4s ease;
    }
    .boot-screen.hidden { opacity: 0; pointer-events: none; }
    .boot-screen__logo { font-size: 72px; margin-bottom: 16px; animation: pulse 2s ease-in-out infinite; }
    .boot-screen__title { font-size: 26px; font-weight: 800; margin-bottom: 8px;
      background: linear-gradient(135deg, #fbbf24, #f59e0b); -webkit-background-clip: text;
      background-clip: text; color: transparent; letter-spacing: -0.02em; }
    .boot-screen__sub { font-size: 13px; color: #8A8FA3; margin-bottom: 32px; }
    .boot-screen__loader { width: 220px; height: 3px; background: #1F2330; border-radius: 2px; overflow: hidden; }
    .boot-screen__bar { height: 100%; background: linear-gradient(90deg, #fbbf24, #f59e0b); width: 30%; animation: slide 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    @keyframes slide { 0% { transform: translateX(-100%); } 100% { transform: translateX(400%); } }
    noscript {
      display: flex; align-items: center; justify-content: center; height: 100vh;
      background: #07080C; color: #E8EAF2; font-family: system-ui; text-align: center; padding: 20px;
    }
  </style>
</head>
<body>
  <!-- Boot screen — instantly visible, hides when App.init completes -->
  <div class="boot-screen" id="boot-screen">
    <div class="boot-screen__logo">🐝</div>
    <div class="boot-screen__title">BeeMaster AI</div>
    <div class="boot-screen__sub">Arıcılık Yönetim Platformu</div>
    <div class="boot-screen__loader"><div class="boot-screen__bar"></div></div>
  </div>

  <noscript>
    <div>
      <h1>🐝 BeeMaster AI</h1>
      <p>JavaScript gereklidir. Lütfen tarayıcınızda JS'yi etkinleştirin.</p>
    </div>
  </noscript>

  <!-- App shell -->
  <div class="app">
    <aside class="sidebar" id="sidebar"></aside>

    <header class="header">
      <div class="page-title">
        <h1 id="page-title">Dashboard</h1>
        <p id="page-subtitle">Genel bakış · Eğil, Diyarbakır</p>
      </div>
      <div class="header-actions">
        <button class="btn btn--icon btn--ghost" onclick="BM.Toast.show('Arama yakında','info')" title="Ara">🔍</button>
        <button class="btn btn--icon btn--ghost" onclick="App.toggleTheme()" id="theme-toggle" title="Tema">🌙</button>
        <button class="btn btn--icon btn--ghost" onclick="BM.notify.check()" title="Bildirimler">🔔</button>
        <button class="btn btn--primary" onclick="App.quickAdd()">+ Ekle</button>
      </div>
    </header>

    <main class="main">
      <div class="main__inner">
        <div id="view-dashboard" class="view view--active"></div>
        <div id="view-apiaries" class="view"></div>
        <div id="view-hives" class="view"></div>
        <div id="view-hive-detail" class="view"></div>
        <div id="view-inspections" class="view"></div>
        <div id="view-harvest" class="view"></div>
        <div id="view-feeding" class="view"></div>
        <div id="view-treatments" class="view"></div>
        <div id="view-diseases" class="view"></div>
        <div id="view-queens" class="view"></div>
        <div id="view-inventory" class="view"></div>
        <div id="view-analytics" class="view"></div>
        <div id="view-reports" class="view"></div>
        <div id="view-settings" class="view"></div>
      </div>
    </main>
  </div>

  <nav class="bottom-nav" id="bottom-nav"></nav>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal__head">
        <div class="modal__title" id="modal-title">Başlık</div>
        <button type="button" class="modal__close" onclick="BM.Modal.close()" aria-label="Kapat">×</button>
      </div>
      <form id="modal-form" onsubmit="return false">
        <div class="modal__body" id="modal-body"></div>
        <div class="modal__foot">
          <button type="button" class="btn btn--ghost" onclick="BM.Modal.close()">İptal</button>
          <button type="submit" class="btn btn--primary" id="modal-submit">Kaydet</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- ============================================================
       SINGLE BUNDLE — All BM modules + App controller
       Loaded with defer to ensure DOM ready before execution
       ============================================================ -->
  <script src="js/app.bundle.js?v=5" defer></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin="anonymous" defer></script>

  <!-- Init script — runs AFTER bundle (DOMContentLoaded) -->
  <script>
    // Global error handler
    window.addEventListener('error', e => {
      console.error('[GLOBAL ERROR]', e.error || e.message);
    });
    window.addEventListener('unhandledrejection', e => {
      console.error('[UNHANDLED REJECTION]', e.reason);
    });

    // Hide boot screen once App is ready
    function hideBootScreen() {
      var boot = document.getElementById('boot-screen');
      if (boot && !boot.classList.contains('hidden')) {
        boot.classList.add('hidden');
        setTimeout(function() { if (boot.parentNode) boot.remove(); }, 500);
      }
    }

    // Show error on boot screen
    function showBootError(msg) {
      var boot = document.getElementById('boot-screen');
      if (boot) {
        boot.innerHTML = '<div style="text-align:center;padding:32px;max-width:480px">' +
          '<div style="font-size:56px;margin-bottom:16px">⚠️</div>' +
          '<div style="font-size:20px;font-weight:800;margin-bottom:12px;color:#EF4444">Yükleme Hatası</div>' +
          '<div style="font-size:13px;color:#8A8FA3;line-height:1.5;margin-bottom:20px">' + msg + '</div>' +
          '<button onclick="localStorage.clear();location.reload()" style="padding:12px 24px;background:#F4B400;color:#000;border:none;border-radius:8px;cursor:pointer;font-weight:700;font-size:14px">🔄 Yenile & Cache Temizle</button>' +
          '</div>';
      }
    }

    // Init App — wait for DOM + bundle
    function bootstrap() {
      if (typeof App === 'undefined' || typeof BM === 'undefined') {
        return setTimeout(bootstrap, 50);
      }
      try {
        App.init();
        console.log('[BeeMaster AI v3.5] Ready');
        setTimeout(hideBootScreen, 300);
      } catch (e) {
        console.error('Init failed:', e);
        showBootError(e.message || 'Bilinmeyen hata');
      }
    }

    // Start polling for App
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', bootstrap);
    } else {
      bootstrap();
    }

    // Fallback: hide boot after 5s no matter what
    setTimeout(function() {
      hideBootScreen();
    }, 5000);
  </script>
</body>
</html>
